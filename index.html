<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kopi Setengah-4 | PI Cloud</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { background-color: #000; color: #d4af37; font-family: sans-serif; margin: 0; padding: 2px; display: flex; flex-direction: column; align-items: center; padding-bottom: 40px; }
        .top-nav { width: 100%; max-width: 600px; display: flex; justify-content: space-between; margin-bottom: 5px; gap: 3px; }
        .btn-main { padding: 6px; border: none; border-radius: 3px; font-weight: bold; cursor: pointer; font-size: 10px; flex: 1; color: white; }
        .btn-wa { background-color: #25D366; }
        .btn-menu { background-color: #d4af37; color: #000; }
        .btn-reset { background-color: #d32f2f; }
        .sync-indicator { font-size: 8px; color: #888; margin-bottom: 5px; }

        #menu-selection-overlay, #report-page { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; 
        }
        #report-page { background: #1a1a1a; z-index: 200; overflow-y: auto; flex-direction: column; padding: 15px 0; }

        .container { width: 100%; max-width: 600px; }
        .logo-pi { width: 25px; height: 25px; border: 1px solid #d4af37; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2px; font-size: 10px; font-weight: bold; }
        .header-title { text-align: center; font-size: 12px; font-weight: bold; margin-bottom: 5px; }

        .info-section { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 9px; }
        .info-details select { background: #111; color: #fff; border: 1px solid #333; font-size: 9px; padding: 1px; width: 100px; }
        
        .roti-table { border: 1px solid #444; width: 110px; border-collapse: collapse; }
        .roti-table th { background-color: #fff; color: #000; font-size: 8px; }
        .roti-table td { border: 1px solid #333; height: 14px; }
        .roti-table input { background: transparent; border: none; color: #d4af37; width: 100%; text-align: right; font-size: 9px; }

        table.main-table { width: 100%; border-collapse: collapse; font-size: 9px; table-layout: fixed; }
        table.main-table th { background-color: #1a1a1a; border: 1px solid #333; padding: 2px 0; color: #888; font-size: 8px; }
        table.main-table td { border: 1px solid #333; height: 16px; text-align: center; }
        table.main-table input { background: transparent; border: none; color: white; width: 100%; text-align: center; font-size: 9px; }
        .col-nama { width: 35%; text-align: left !important; padding-left: 4px !important; color: #d4af37; font-weight: bold; }

        .omset-grid { display: grid; grid-template-columns: 1.5fr 1fr; border: 1px solid #333; margin-top: 5px; background: #050505; }
        .omset-row { display: flex; justify-content: space-between; padding: 1px 5px; border-bottom: 1px solid #111; font-size: 8.5px; height: 15px; align-items: center; }
        .omset-row input { background: transparent; border: none; color: white; width: 60px; text-align: right; font-size: 9px; }
        .omset-total { font-size: 20px; font-weight: bold; color: #fff; display: flex; align-items: center; justify-content: center; }

        .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; margin-top: 4px; }
        .footer-box { border: 1px solid #333; padding: 3px; text-align: center; background-color: #050505; }
        .footer-box label { font-size: 7px; color: #888; display: block; }
        .footer-box input { background: transparent; border: none; color: #fff; width: 100%; text-align: center; font-size: 9px; }

        /* Style Laporan Putih */
        .report-canvas-area { background: #fff; color: #000; width: 95%; max-width: 440px; margin: 0 auto; padding: 15px; border-radius: 2px; }
        .rep-header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 8px; }
        .rep-meta-info { font-size: 10px; font-weight: bold; line-height: 1.5; }
        .white-table { width: 100%; border-collapse: collapse; font-size: 8.5px; margin-bottom: 8px; }
        .white-table th, .white-table td { border: 1px solid #bbb; padding: 2.5px; }
    </style>
</head>
<body>

<div class="top-nav">
    <button class="btn-main btn-wa" onclick="simpanKeFirebase()">SIMPAN CLOUD</button>
    <button class="btn-main btn-menu" onclick="bukaRiwayat()">RIWAYAT</button>
    <button class="btn-main btn-reset" onclick="jalankanReset()">RESET</button>
</div>

<div class="sync-indicator" id="sync-status">Status: Cloud Terhubung (Real-time)</div>

<div class="container">
    <div class="logo-pi">PI</div>
    <div class="header-title">KOPI SETENGAH-4</div>

    <div class="info-section">
        <div class="info-details">
            TANGGAL: <span id="label-tgl" style="color:#fff; font-weight: bold;">-</span><br>
            CABANG: 
            <select id="main-cabang" onchange="muatDataCloud()">
                <option>Pondok Indah</option><option>Cemput</option><option>Otista</option><option>Jl.Panjang</option><option>Tandur</option><option>Menteng</option>
            </select><br>
            SHIFT: 
            <select id="main-shift" onchange="muatDataCloud()">
                <option>SHIFT 1</option><option>SHIFT 2</option>
            </select>
        </div>
        
        <table class="roti-table">
            <thead><tr><th colspan="2">SISA ROTI</th></tr></thead>
            <tbody>
                <tr><td>COKLAT</td><td><input type="text" id="roti-coklat" oninput="simpanKeFirebase()"></td></tr>
                <tr><td>VANILLA</td><td><input type="text" id="roti-vanilla" oninput="simpanKeFirebase()"></td></tr>
                <tr><td>BLUEBERRY</td><td><input type="text" id="roti-blueberry" oninput="simpanKeFirebase()"></td></tr>
            </tbody>
        </table>
    </div>

    <table class="main-table">
        <thead>
            <tr><th class="col-nama">NAMA BARANG</th><th>STOK</th><th>MSK</th><th>RSK</th><th>TRJL</th><th>SISA</th></tr>
        </thead>
        <tbody id="inventory-body"></tbody>
    </table>

    <div class="omset-grid">
        <div id="omset-inputs"></div>
        <div class="omset-total" id="display-total">0</div>
    </div>

    <div class="footer-grid">
        <div class="footer-box"><label>CASH AWAL</label><input type="text" id="cash-awal" oninput="simpanKeFirebase()"></div>
        <div class="footer-box"><label>CASH AKHIR</label><input type="text" id="cash-akhir" oninput="simpanKeFirebase()"></div>
    </div>
    <div class="footer-box" style="margin-top:3px; width:100%; box-sizing: border-box;"><label>BERITA ACARA</label><input type="text" id="note" oninput="simpanKeFirebase()" style="text-align: left; padding: 2px 5px;"></div>
</div>

<div id="menu-selection-overlay">
    <div class="box-content" style="background: #1a1a1a; padding: 20px; border: 1px solid #d4af37; border-radius: 10px;">
        <h3 style="color:#d4af37">CARI LAPORAN</h3>
        <input type="date" id="search-date">
        <select id="search-cabang"><option>Pondok Indah</option><option>Cemput</option><option>Otista</option><option>Jl.Panjang</option><option>Tandur</option><option>Menteng</option></select>
        <select id="search-shift"><option>SHIFT 1</option><option>SHIFT 2</option></select>
        <button class="btn-main btn-wa" onclick="bukaLaporanCloud()">LIHAT</button>
        <p onclick="kembaliUtama()" style="color:#888; font-size:10px; margin-top:10px; cursor:pointer;">KEMBALI</p>
    </div>
</div>

<div id="report-page">
    <div class="report-canvas-area" id="capture-area">
        <div class="rep-header"><h2>KOPI SETENGAH-4</h2></div>
        <div id="rep-meta-content" class="rep-meta-flex"></div>
        <table class="white-table"><thead><tr><th>NAMA BARANG</th><th>STOK</th><th>MSK</th><th>TRJL</th><th>SISA</th></tr></thead><tbody id="rep-body"></tbody></table>
        <div id="rep-omset-footer"></div>
    </div>
    <div style="display:flex; gap:10px; margin-top:10px; width: 95%; max-width: 440px;">
        <button class="btn-main btn-wa" onclick="downloadSebagaiGambar()">PNG</button>
        <button class="btn-main btn-reset" onclick="kembaliUtama()">KEMBALI</button>
    </div>
</div>

<script>
    // --- GANTI DENGAN KONFIGURASI FIREBASE ANDA ---
    Laporan harian

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDZU6wFZPbBX0di2sAG7ve93ArFgdZ0trw",
  authDomain: "laporan-harian-f096f.firebaseapp.com",
  databaseURL: "https://laporan-harian-f096f-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "laporan-harian-f096f",
  storageBucket: "laporan-harian-f096f.firebasestorage.app",
  messagingSenderId: "1063740425135",
  appId: "1:1063740425135:web:2d7a4befce6521d72d255a",
    };
    // ----------------------------------------------

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const daftarBarang = ["CUP KECIL", "CUP BESAR", "CUP HOT", "BOTOL 1 LITER", "BOTOL 500 ML", "GULA AREN", "GULA PUTIH", "KOPI", "SUSU UHT", "KRIMER", "SEA SALT", "FN", "SKM", "HERSHEY'S", "REMON", "SEDOTAN KEC", "SEDOTAN BSR", "PLASTIK ISI 2", "PLASTIK ISI 1", "PLASTIK BSR", "CUP SEALER", "BASE SUSU", "BASE KOPI", "ROTI"];
    const daftarOmset = ["CASH", "TRANSFER", "GRAB FOOD", "OVO", "SHOPEE FOOD", "SHOPEE PAY", "GOJEK", "GOPAY", "AIRASIA"];

    function inisialisasiTabel() {
        const tbody = document.getElementById('inventory-body');
        tbody.innerHTML = "";
        daftarBarang.forEach(item => {
            const id = item.replace(/[^A-Z0-9]/ig, "_");
            tbody.innerHTML += `<tr><td class="col-nama">${item}</td>
                <td><input type="text" id="stok_${id}" oninput="simpanKeFirebase()"></td>
                <td><input type="text" id="msk_${id}" oninput="simpanKeFirebase()"></td>
                <td><input type="text" id="rsk_${id}" oninput="simpanKeFirebase()"></td>
                <td><input type="text" id="trjl_${id}" oninput="simpanKeFirebase()"></td>
                <td><input type="text" id="sisa_${id}" oninput="simpanKeFirebase()"></td></tr>`;
        });
        const oDiv = document.getElementById('omset-inputs');
        oDiv.innerHTML = "";
        daftarOmset.forEach(m => { oDiv.innerHTML += `<div class="omset-row"><span>${m}</span><input type="text" class="omset-val" id="o_${m.replace(/[^A-Z0-9]/ig,'_')}" oninput="simpanKeFirebase()"></div>`; });
    }

    function getPath() {
        const tgl = new Date().toISOString().split('T')[0];
        const cab = document.getElementById('main-cabang').value.replace(/\s/g, '_');
        const shf = document.getElementById('main-shift').value.replace(/\s/g, '_');
        return `laporan/${tgl}/${cab}/${shf}`;
    }

    function simpanKeFirebase() {
        hitungTotal();
        const data = {};
        document.querySelectorAll('input').forEach(el => { if(el.id) data[el.id] = el.value; });
        data.total = document.getElementById('display-total').innerText;
        data.lastUpdate = new Date().getTime();
        
        db.ref(getPath()).set(data);
    }

    function muatDataCloud() {
        const d = new Date();
        document.getElementById('label-tgl').innerText = d.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' }).toUpperCase();
        
        db.ref(getPath()).on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                Object.keys(data).forEach(key => {
                    const el = document.getElementById(key);
                    if(el) el.value = data[key];
                });
                document.getElementById('display-total').innerText = data.total || "0";
            } else {
                document.querySelectorAll('input').forEach(el => el.value = "");
                document.getElementById('display-total').innerText = "0";
            }
        });
    }

    function hitungTotal() {
        let total = 0;
        document.querySelectorAll('.omset-val').forEach(el => { total += parseInt(el.value.replace(/[^0-9]/g, '')) || 0; });
        document.getElementById('display-total').innerText = total.toLocaleString('id-ID');
    }

    function bukaRiwayat() { document.getElementById('menu-selection-overlay').style.display = 'flex'; }
    function kembaliUtama() { document.getElementById('menu-selection-overlay').style.display = 'none'; document.getElementById('report-page').style.display = 'none'; }

    function bukaLaporanCloud() {
        const tgl = document.getElementById('search-date').value;
        const cab = document.getElementById('search-cabang').value.replace(/\s/g, '_');
        const shf = document.getElementById('search-shift').value.replace(/\s/g, '_');

        db.ref(`laporan/${tgl}/${cab}/${shf}`).once('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) { alert("Data Tidak Ditemukan!"); return; }
            
            // Render Laporan (Sama dengan logika sebelumnya, ambil data dari 'data' firebase)
            renderHalamanLaporan(data, tgl, cab, shf);
        });
    }

    // Fungsi Render & Download Gambar tetap sama (panggil data dari Firebase)
    // ... (Logika renderHalamanLaporan & downloadSebagaiGambar disingkat demi ruang, tetap menggunakan pola sebelumnya) ...

    window.onload = () => { inisialisasiTabel(); muatDataCloud(); };
</script>
</body>
</html>
