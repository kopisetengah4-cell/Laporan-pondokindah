<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KS4 Dash">
    <link rel="apple-touch-icon" href="Logo-al.png">
    <meta name="theme-color" content="#d4af37">
    <link rel="icon" type="image/png" href="Logo-al.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PI Dashboard | STABLE v118</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        body { background-color: #000; color: #d4af37; font-family: sans-serif; margin: 0; padding: 2px; display: flex; flex-direction: column; align-items: center; }
        .top-nav { width: 100%; max-width: 600px; display: flex; justify-content: space-between; margin-bottom: 5px; gap: 3px; }
        .btn-main { padding: 12px 6px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px; flex: 1; color: white; text-transform: uppercase; }
        .btn-wa { background-color: #25D366; }
        .btn-menu { background-color: #d4af37; color: #000; }
        .btn-reset { background-color: #e74c3c; }
        
        .container { width: 100%; max-width: 600px; padding-bottom: 20px; }
        
        /* Tampilan Tabel Kotak / Tombol Kolom */
        table.main-table { width: 100%; border-collapse: collapse; font-size: 10px; table-layout: fixed; background: #000; }
        table.main-table th { background-color: #1a1a1a; border: 1px solid #333; padding: 6px 0; color: #888; font-size: 8px; }
        .col-nama { width: 35%; text-align: left !important; padding-left: 5px !important; color: #d4af37; font-weight: bold; }
        .col-data { width: 13%; }
        table.main-table td { border: 1px solid #333; height: 35px; text-align: center; padding: 0; }
        table.main-table input { background: transparent; border: none; color: white; width: 100%; height: 100%; text-align: center; outline: none; font-size: 14px; }

        .omset-grid { display: grid; grid-template-columns: 1.5fr 1fr; border: 1px solid #333; margin-top: 5px; background: #050505; }
        .omset-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #111; font-size: 11px; color: #fff; }
        .omset-row input { background: transparent; border: none; color: white; width: 100px; text-align: right; outline: none; font-size: 13px; }
        .omset-total-box { font-size: 32px; font-weight: bold; color: #fff; display: flex; align-items: center; justify-content: center; background: #000; border-left: 1px solid #333; }

        #report-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:4000; padding: 10px; overflow-y: auto; }
    </style>
</head>
<body onload="initApp()">

<div class="top-nav">
    <button class="btn-main btn-wa" onclick="prosesSimpan()">SIMPAN FINAL</button>
    <button class="btn-main btn-menu" onclick="bukaRiwayat()">RIWAYAT</button>
    <button class="btn-main btn-reset" onclick="resetApp()">RESET</button>
</div>

<div class="container">
    <div style="text-align: center; font-size: 16px; font-weight: bold; margin: 10px 0; color: #d4af37;">KOPI SETENGAH-4</div>
    
    <div style="font-size:11px; margin-bottom:10px; border-bottom: 1px solid #333; padding-bottom: 5px;">
        <span id="label-hari" style="font-weight:bold; color: #fff;">-</span> | 
        <span id="label-tgl">-</span> | 
        CAB: <select id="main-cab" onchange="gantiLokasi()"></select> | 
        SHIFT: <select id="main-shf" onchange="gantiShift()"></select>
    </div>

    <table class="main-table">
        <thead>
            <tr><th class="col-nama">BARANG</th><th class="col-data">STOK</th><th class="col-data">MSK</th><th class="col-data">RSK</th><th class="col-data">TRJL</th><th class="col-data">SISA</th></tr>
        </thead>
        <tbody id="list-barang"></tbody>
    </table>

    <div class="omset-grid">
        <div id="list-omset"></div>
        <div class="omset-total-box" id="val-total">0</div>
    </div>
</div>

<script>
    // Config Firebase Bos (Tetap Aktif)
    const firebaseConfig = {
        apiKey: "AIzaSyDZU6wFZPbBX0di2sAG7ve93ArFgdZ0trw",
        authDomain: "laporan-harian-f096f.firebaseapp.com",
        databaseURL: "https://laporan-harian-f096f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "laporan-harian-f096f",
        storageBucket: "laporan-harian-f096f.firebasestorage.app",
        messagingSenderId: "1063740425135",
        appId: "1:1063740425135:web:2d7a4befce6521d72d255a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const barang_list = ["CUP KECIL", "CUP BESAR", "CUP HOT", "BOTOL 1 LITER", "BOTOL 500 ML", "GULA AREN", "GULA PUTIH", "KOPI", "SUSU UHT", "KRIMER", "SEA SALT", "FN", "SKM", "HERSHEY'S", "REMON", "SEDOTAN KEC", "SEDOTAN BSR", "PLASTIK ISI 2", "PLASTIK ISI 1", "PLASTIK BSR", "CUP SEALER", "BASE SUSU", "BASE KOPI", "ROTI"];
    const omset_list = ["CASH", "TRANSFER", "GRAB FOOD", "OVO", "SHOPEE FOOD", "SHOPEE PAY", "GOJEK", "GOPAY", "AIRASIA"];
    const cab_list = ["Tandur", "Kebon Jeruk", "Pondok Indah", "Otista", "Cemput", "Menteng"];
    
    let pathAktif = "";

    function initApp() {
        const d = new Date();
        const tglStr = d.toISOString().split('T')[0];
        const hr = ["MINGGU", "SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU"];
        document.getElementById('label-tgl').innerText = tglStr;
        document.getElementById('label-hari').innerText = hr[d.getDay()];
        
        const cSel = document.getElementById('main-cab');
        cab_list.forEach(c => { cSel.innerHTML += `<option value="${c}">${c}</option>`; });
        const savedCab = localStorage.getItem('p_cab') || "Tandur";
        cSel.value = savedCab;

        const sSel = document.getElementById('main-shf');
        sSel.innerHTML = `<option value="SHIFT 1">SHIFT 1</option><option value="SHIFT 2">SHIFT 2</option>`;
        const savedShf = localStorage.getItem('p_shf') || "SHIFT 1";
        sSel.value = savedShf;

        renderTables();
        pathAktif = `Drafts/${tglStr}/${savedCab}/${savedShf}`;
        
        // Tarik data live
        db.ref(pathAktif).on('value', snp => {
            const data = snp.val();
            if (data) {
                Object.keys(data).forEach(key => {
                    const input = document.getElementById(key);
                    if (input && input !== document.activeElement) input.value = data[key];
                });
                hitungTotal();
            }
        });
    }

    function renderTables() {
        const bBody = document.getElementById('list-barang'); bBody.innerHTML = "";
        barang_list.forEach(item => {
            const id = item.replace(/[^A-Z0-9]/ig, "_");
            bBody.innerHTML += `<tr><td class="col-nama">${item}</td><td><input type="text" id="stok_${id}" oninput="liveSync(this)"></td><td><input type="text" id="msk_${id}" oninput="liveSync(this)"></td><td><input type="text" id="rsk_${id}" oninput="liveSync(this)"></td><td><input type="text" id="trjl_${id}" oninput="liveSync(this)"></td><td><input type="text" id="sisa_${id}" oninput="liveSync(this)"></td></tr>`;
        });
        const oBody = document.getElementById('list-omset'); oBody.innerHTML = "";
        omset_list.forEach(m => {
            oBody.innerHTML += `<div class="omset-row"><span>${m}</span><input type="text" class="inp-o" id="o_${m.replace(/[^A-Z0-9]/ig,'_')}" oninput="liveSync(this)"></div>`;
        });
    }

    function liveSync(el) {
        hitungTotal();
        const update = {}; update[el.id] = el.value;
        db.ref(pathAktif).update(update);
    }

    function hitungTotal() {
        let tot = 0;
        document.querySelectorAll('.inp-o').forEach(i => { tot += parseInt(i.value.replace(/[^0-9]/g,'')) || 0; });
        document.getElementById('val-total').innerText = tot.toLocaleString('id-ID');
    }

    function gantiLokasi() { localStorage.setItem('p_cab', document.getElementById('main-cab').value); location.reload(); }
    function gantiShift() { localStorage.setItem('p_shf', document.getElementById('main-shf').value); location.reload(); }
</script>
</body>
</html>
