<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo-al.png">
    <link rel="icon" type="image/png" sizes="192x192" href="logo-al.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kopi Setengah-4 | Multi-Cabang Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap');
        html, body { background-color: #111; color: #fff; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        .wrapper { width: 100%; overflow-x: auto; padding-bottom: 30px; }
        #area-laporan { background: #000; padding: 10px 15px; width: 480px; margin: 5px auto; box-sizing: border-box; border: 1px solid #333; }
        .main-title { text-align: center; color: #d4a373; font-size: 18px; font-weight: 800; margin-bottom: 8px; letter-spacing: 1px; }
        
        .top-section { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: flex-start; }
        .info-group { font-size: 10px; font-weight: 800; color: #d4a373; line-height: 1.6; }
        .info-val { color: #fff; border-bottom: 1px solid #444; min-width: 80px; display: inline-block; padding-left: 3px; outline: none; }
        
        .cabang-input { background: #222; color: #fff; border: 1px solid #d4a373; font-family: 'Montserrat'; font-size: 10px; font-weight: 800; padding: 2px 5px; border-radius: 4px; outline: none; }

        .roti-box { width: 140px; border: 1px solid #444; background: #fff; }
        .roti-header { background: #eee; color: #d4a373; text-align: center; font-weight: 800; padding: 2px; font-size: 9px; border-bottom: 1px solid #444; }
        .roti-row { display: flex; justify-content: space-between; padding: 2px 8px; border-bottom: 1px solid #ddd; font-size: 9px; font-weight: 800; color: #000; }
        .roti-row span[contenteditable] { color: #d4a373; min-width: 20px; text-align: right; }

        table { width: 100%; border-collapse: collapse; font-size: 9px; margin-top: 5px; }
        th { color: #d4a373; background: #111; padding: 4px 1px; border: 1px solid #444; font-size: 8px; }
        td { border: 1px solid #222; padding: 3px 1px; font-weight: 800; text-align: center; outline: none; color: #fff; }
        .col-nama { width: 150px; text-align: left !important; color: #d4a373; padding-left: 6px; background-color: #050505; }
        
        .omset-container { display: flex; border: 1px solid #333; margin-top: 10px; }
        .omset-row { display: flex; border-bottom: 1px solid #222; height: 22px; align-items: center; }
        .omset-label { width: 110px; padding-left: 10px; font-size: 8px; color: #d4a373; font-weight: 800; }
        .omset-input { flex: 1; text-align: left; outline: none; padding-left: 8px; font-size: 10px; color: #fff; }
        .total-box { width: 130px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 1px solid #333; background: #111; }
        
        .footer-section { display: flex; gap: 8px; margin-top: 10px; }
        .footer-item { flex: 1; border: 1px solid #333; padding: 6px; text-align: center; }
        .footer-label { font-size: 9px; font-weight: 800; color: #d4a373; margin-bottom: 4px; }

        .white-mode { background: #fff !important; color: #000 !important; border: 1.5px solid #000 !important; }
        .white-mode .main-title, .white-mode .info-group, .white-mode .info-val, .white-mode .omset-label, .white-mode .footer-label, .white-mode .roti-header, .white-mode .roti-row, .white-mode .omset-input { color: #000 !important; }
        .white-mode td, .white-mode th { border: 1px solid #000 !important; color: #000 !important; }
        .white-mode th { background: #f0f0f0 !important; }
        .white-mode .col-nama { background: #fafafa !important; color: #000 !important; }
        .white-mode .total-box { background: #f0f0f0 !important; color: #000 !important; }
        .white-mode .cabang-input { display: none; } 
        .white-mode #display-cabang { display: inline-block !important; border-bottom: 1px solid #000; min-width: 80px; }

        /* Controls Section */
        .controls { text-align: center; padding: 15px; background: #111; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        .btn-wa { background: #25D366; color: #fff; padding: 12px; font-weight: 800; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; }
        .btn-reset { background: #dc3545; color: #fff; padding: 8px; font-weight: 700; border-radius: 8px; border: none; cursor: pointer; font-size: 11px; }
        
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        #preview-img { max-width: 95%; border: 1px solid #fff; }
    </style>
</head>
<body onload="initApp()">

<div class="controls">
    <button onclick="prosesKeGambar()" class="btn-wa">BAGIKAN KE WHATSAPP (PUTIH)</button>
    <button onclick="konfirmasiReset()" class="btn-reset">RESET MANUAL (PINDAH KE HARI BARU)</button>
</div>

<div id="overlay">
    <img id="preview-img" src="">
    <button onclick="document.getElementById('overlay').style.display='none'" style="color:#fff; background:#555; border:none; padding:8px 20px; border-radius:5px; margin-top:10px; cursor:pointer;">KEMBALI KE EDIT</button>
</div>

<div class="wrapper">
    <div id="area-laporan">
        <div class="main-title">KOPI SETENGAH-4</div>
        <div class="top-section">
            <div class="info-group">
                <div>HARI : <span id="lbl-hari" class="info-val">...</span></div>
                <div>TGL : <span id="lbl-tgl" class="info-val">...</span></div>
                <div>CABANG : 
                    <select id="select-cabang" class="cabang-input" onchange="gantiCabang()">
                        <option value="TANDUR">TANDUR</option>
                        <option value="JL-PANJANG">JL. PANJANG</option>
                        <option value="PONDOK-INDAH">PONDOK INDAH</option>
                        <option value="MENTENG">MENTENG</option>
                        <option value="CEMPUT">CEMPUT</option>
                        <option value="OTISTA">OTISTA</option>
                    </select>
                    <span id="display-cabang" style="display:none; font-weight:800;"></span>
                </div>
            </div>
            <div class="roti-box">
                <div class="roti-header">SISA ROTI (FISIK)</div>
                <div class="roti-row"><span>COKLAT</span><span contenteditable="true" id="roti-coklat" class="auto-save">0</span></div>
                <div class="roti-row"><span>VANILLA</span><span contenteditable="true" id="roti-vanilla" class="auto-save">0</span></div>
                <div class="roti-row"><span>BLUEBERRY</span><span contenteditable="true" id="roti-blueberry" class="auto-save">0</span></div>
            </div>
        </div>

        <table>
            <thead><tr><th style="width:150px">NAMA BARANG</th><th>STOK</th><th>MSK</th><th>RSK</th><th>TRJL</th><th>SISA</th></tr></thead>
            <tbody id="inventory-body"></tbody>
        </table>

        <div class="omset-container">
            <div style="flex:1" id="omset-list"></div>
            <div class="total-box">
                <div style="font-size: 9px; margin-bottom: 3px; color: #d4a373;">TOTAL OMSET</div>
                <div id="total-val" style="font-size: 20px; font-weight: 800;">0</div>
            </div>
        </div>

        <div class="footer-section">
            <div class="footer-item">
                <div class="footer-label">CASH AWAL / AKHIR</div>
                <div contenteditable="true" id="save-cash" class="auto-save" style="font-weight: 800; font-size: 11px;">0</div>
            </div>
            <div class="footer-item">
                <div class="footer-label">BERITA ACARA:</div>
                <div contenteditable="true" id="save-berita" class="auto-save" style="font-size: 9px;">-</div>
            </div>
        </div>
    </div>
</div>

<script>
    const manualOnly = ["CUP KECIL", "CUP BESAR", "SUSU UHT", "KRIMER", "SKM", "BASE SUSU", "BASE KOPI", "ROTI"];
    const daftarBarangMaster = [
        {"nama": "CUP KECIL", "stok": "1.156"}, {"nama": "CUP BESAR", "stok": "133"}, {"nama": "CUP HOT", "stok": "127"},
        {"nama": "BOTOL 1 LITER", "stok": "22"}, {"nama": "BOTOL 500 ML", "stok": "49"}, {"nama": "GULA AREN", "stok": "4½"},
        {"nama": "GULA PUTIH", "stok": "1½"}, {"nama": "KOPI", "stok": "15"}, {"nama": "SUSU UHT", "stok": "23/961"},
        {"nama": "KRIMER", "stok": "10/660"}, {"nama": "SEA SALT CREAM", "stok": "1/870"}, {"nama": "FN", "stok": "4/290"},
        {"nama": "SKM", "stok": "6/77"}, {"nama": "HERSHEY'S", "stok": "1/620"}, {"nama": "REMON", "stok": "27"},
        {"nama": "SEDOTAN KECIL", "stok": "5½"}, {"nama": "SEDOTAN BESAR", "stok": "2½"}, {"nama": "PLASTIK ISI 2", "stok": "5"},
        {"nama": "PLASTIK ISI 1", "stok": "7"}, {"nama": "PLASTIK BESAR", "stok": "7"}, {"nama": "CUP SEALER", "stok": "1"},
        {"nama": "BASE SUSU", "stok": "2.100"}, {"nama": "BASE KOPI", "stok": "1.100"}, {"nama": "ROTI", "stok": "48"}
    ];

    function initApp() {
        const lastCabang = localStorage.getItem('user_permanent_cabang');
        if (lastCabang) {
            document.getElementById('select-cabang').value = lastCabang;
        }
        jalankanSistemEstafet();
    }

    function gantiCabang() {
        const cabangBaru = document.getElementById('select-cabang').value;
        localStorage.setItem('user_permanent_cabang', cabangBaru);
        jalankanSistemEstafet();
    }

    function konfirmasiReset() {
        if(confirm("PERINGATAN: Semua angka omset akan jadi 0 dan sisa stok akan dipindahkan ke stok awal besok. Lanjutkan?")) {
            eksekusiResetManual();
        }
    }

    function eksekusiResetManual() {
        const tglSkrg = new Date().toLocaleDateString('id-ID');
        const cabangAktif = document.getElementById('select-cabang').value;
        
        daftarBarangMaster.forEach((barang, i) => {
            const sisaHariIni = localStorage.getItem(`${cabangAktif}_sisa-${i}`) || "0";
            // Estafet: Sisa jadi Stok Baru
            localStorage.setItem(`${cabangAktif}_stok-${i}`, sisaHariIni);
            // Reset kolom lainnya
            localStorage.setItem(`${cabangAktif}_msk-${i}`, "0");
            localStorage.setItem(`${cabangAktif}_rsk-${i}`, "0");
            localStorage.setItem(`${cabangAktif}_trjl-${i}`, "0");
            // Barang wajib cek fisik dikosongkan sisanya
            localStorage.setItem(`${cabangAktif}_sisa-${i}`, manualOnly.includes(barang.nama) ? "0" : sisaHariIni);
        });

        // Reset Omset & Footer
        for(let i=0; i<7; i++) localStorage.setItem(`${cabangAktif}_omset-${i}`, "0");
        localStorage.setItem(`${cabangAktif}_save-cash`, "0");
        localStorage.setItem(`${cabangAktif}_save-berita`, "-");
        
        // Update Tanggal Terakhir
        localStorage.setItem(`${cabangAktif}_last_date`, tglSkrg);
        
        alert("Reset Berhasil! Selamat bekerja di hari baru.");
        location.reload();
    }

    function jalankanSistemEstafet() {
        const tglSkrg = new Date().toLocaleDateString('id-ID');
        const cabangAktif = document.getElementById('select-cabang').value;
        const tglTerakhir = localStorage.getItem(`${cabangAktif}_last_date`);
        
        const opsi = { weekday: 'long', day: 'numeric', month: 'numeric', year: 'numeric' };
        const hariIni = new Date().toLocaleDateString('id-ID', opsi).split(', ');
        document.getElementById('lbl-hari').innerText = hariIni[0].toUpperCase();
        document.getElementById('lbl-tgl').innerText = hariIni[1];

        // Otomatis Pindah Hari
        if (tglTerakhir && tglTerakhir !== tglSkrg) {
            eksekusiResetManual(); 
        }
        tampilkanTabel();
    }

    function tampilkanTabel() {
        const tbody = document.getElementById('inventory-body');
        const cabangAktif = document.getElementById('select-cabang').value;
        tbody.innerHTML = "";
        
        daftarBarangMaster.forEach((barang, i) => {
            const isManual = manualOnly.includes(barang.nama);
            const valStok = localStorage.getItem(`${cabangAktif}_stok-${i}`) || barang.stok;
            const valMsk = localStorage.getItem(`${cabangAktif}_msk-${i}`) || "0";
            const valRsk = localStorage.getItem(`${cabangAktif}_rsk-${i}`) || "0";
            const valTrjl = localStorage.getItem(`${cabangAktif}_trjl-${i}`) || "0";
            const valSisa = localStorage.getItem(`${cabangAktif}_sisa-${i}`) || (isManual ? "0" : valStok);

            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="col-nama">${barang.nama}</td>
                <td contenteditable="true" class="cell-save" data-key="stok-${i}">${valStok}</td>
                <td contenteditable="true" class="cell-save" data-key="msk-${i}">${valMsk}</td>
                <td contenteditable="true" class="cell-save" data-key="rsk-${i}">${valRsk}</td>
                <td contenteditable="true" class="cell-save" data-key="trjl-${i}">${valTrjl}</td>
                <td contenteditable="true" class="cell-save" data-key="sisa-${i}">${valSisa}</td>`;
            tbody.appendChild(tr);
        });

        const omsets = ["CASH", "TRANSFER", "GRAB", "QRIS/OVO", "SHOPEE", "COJEK", "GOPAY"];
        const oList = document.getElementById('omset-list');
        oList.innerHTML = "";
        omsets.forEach((o, i) => {
            const saved = localStorage.getItem(`${cabangAktif}_omset-${i}`) || "0";
            oList.innerHTML += `<div class="omset-row"><div class="omset-label">${o}</div><div class="omset-input cell-save" contenteditable="true" data-key="omset-${i}">${saved}</div></div>`;
        });

        const extraKeys = ['roti-coklat', 'roti-vanilla', 'roti-blueberry', 'save-cash', 'save-berita'];
        extraKeys.forEach(k => {
            const saved = localStorage.getItem(`${cabangAktif}_${k}`);
            if(saved) document.getElementById(k).innerText = saved;
            else document.getElementById(k).innerText = (k === 'save-berita' ? '-' : '0');
        });

        document.querySelectorAll('.cell-save, .auto-save').forEach(el => {
            el.addEventListener('input', () => {
                const key = el.getAttribute('data-key') || el.id;
                localStorage.setItem(`${cabangAktif}_${key}`, el.innerText);
                hitungTotal();
            });
        });
        hitungTotal();
    }

    function hitungTotal() {
        let t = 0;
        document.querySelectorAll('.omset-input').forEach(i => t += parseInt(i.innerText.replace(/\./g, '')) || 0);
        document.getElementById('total-val').innerText = t.toLocaleString('id-ID');
    }

    function prosesKeGambar() {
        const area = document.getElementById('area-laporan');
        const sel = document.getElementById('select-cabang');
        const disp = document.getElementById('display-cabang');
        disp.innerText = sel.options[sel.selectedIndex].text;
        area.classList.add('white-mode');
        setTimeout(() => {
            html2canvas(area, { scale: 2 }).then(canvas => {
                document.getElementById('preview-img').src = canvas.toDataURL();
                document.getElementById('overlay').style.display = 'flex';
                area.classList.remove('white-mode');
            });
        }, 100);
    }
</script>
</body>
</html>
