<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kopi Setengah-4 | Sistem Ringkas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap');
        html, body { background-color: #111; color: #fff; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        .wrapper { width: 100%; overflow-x: auto; padding-bottom: 30px; }
        #area-laporan { background: #000; padding: 10px 15px; width: 480px; margin: 5px auto; box-sizing: border-box; border: 1px solid #333; }
        .main-title { text-align: center; color: #d4a373; font-size: 18px; font-weight: 800; margin-bottom: 8px; letter-spacing: 1px; }
        
        /* Header Section */
        .top-section { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: flex-start; }
        .info-group { font-size: 10px; font-weight: 800; color: #d4a373; line-height: 1.4; }
        .info-val { color: #fff; border-bottom: 1px solid #444; min-width: 80px; display: inline-block; padding-left: 3px; outline: none; }
        
        /* Roti Box Ringkas */
        .roti-box { width: 140px; border: 1px solid #444; background: #000; }
        .roti-header { background: #111; color: #d4a373; text-align: center; font-weight: 800; padding: 2px; font-size: 9px; border-bottom: 1px solid #444; }
        .roti-row { display: flex; justify-content: space-between; padding: 2px 8px; border-bottom: 1px solid #222; font-size: 9px; font-weight: 800; color: #fff; }
        .roti-row span[contenteditable] { color: #fff; min-width: 20px; text-align: right; }

        /* Tabel Super Ringkas */
        table { width: 100%; border-collapse: collapse; font-size: 9px; margin-top: 5px; }
        th { color: #d4a373; background: #111; padding: 4px 1px; border: 1px solid #444; font-size: 8px; }
        td { border: 1px solid #222; padding: 3px 1px; font-weight: 800; text-align: center; outline: none; color: #fff; }
        .col-nama { width: 150px; text-align: left !important; color: #d4a373; padding-left: 6px; background-color: #050505; }
        
        /* Omset Section */
        .omset-container { display: flex; border: 1px solid #333; margin-top: 10px; }
        .omset-row { display: flex; border-bottom: 1px solid #222; height: 22px; align-items: center; }
        .omset-label { width: 110px; padding-left: 10px; font-size: 8px; color: #d4a373; font-weight: 800; }
        .omset-input { flex: 1; text-align: left; outline: none; padding-left: 8px; font-size: 10px; color: #fff; }
        .total-box { width: 130px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 1px solid #333; background: #111; }
        
        /* Footer Section */
        .footer-section { display: flex; gap: 8px; margin-top: 10px; }
        .footer-item { flex: 1; border: 1px solid #333; padding: 6px; text-align: center; }
        .footer-label { font-size: 9px; font-weight: 800; color: #d4a373; margin-bottom: 4px; }

        /* Mode Putih (Unduh) */
        .white-mode { background: #fff !important; color: #000 !important; border: 1.5px solid #000 !important; }
        .white-mode .main-title, .white-mode .info-group, .white-mode .info-val, .white-mode .omset-label, .white-mode .footer-label, .white-mode .roti-header, .white-mode .roti-row { color: #000 !important; }
        .white-mode .roti-row span[contenteditable] { color: #000 !important; }
        .white-mode td, .white-mode th { border: 1px solid #000 !important; color: #000 !important; }
        .white-mode th { background: #f0f0f0 !important; }
        .white-mode .col-nama { background: #fafafa !important; color: #000 !important; }
        .white-mode .total-box { background: #f0f0f0 !important; color: #000 !important; }

        .controls { text-align: center; padding: 15px; background: #111; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .btn-wa { background: #25D366; color: #fff; padding: 12px 25px; font-weight: 800; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto; gap: 8px; font-size: 14px; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        #preview-img { max-width: 95%; border: 1px solid #fff; }
    </style>
</head>
<body onload="jalankanSistemEstafet()">

<div class="controls">
    <button onclick="prosesKeGambar()" class="btn-wa">BAGIKAN KE WHATSAPP (PUTIH)</button>
</div>

<div id="overlay">
    <img id="preview-img" src="">
    <button onclick="document.getElementById('overlay').style.display='none'" style="color:#fff; background:#555; border:none; padding:8px 20px; border-radius:5px; margin-top:10px; cursor:pointer;">KEMBALI</button>
</div>

<div class="wrapper">
    <div id="area-laporan">
        <div class="main-title">KOPI SETENGAH-4</div>
        <div class="top-section">
            <div class="info-group">
                <div>HARI : <span id="lbl-hari" class="info-val">...</span></div>
                <div>TGL : <span id="lbl-tgl" class="info-val">...</span></div>
                <div>CABANG : <span class="info-val" contenteditable="true" id="save-cabang">PONDOK INDAH</span></div>
            </div>
            <div class="roti-box">
                <div class="roti-header">SISA ROTI (FISIK)</div>
                <div class="roti-row"><span>COKLAT</span><span contenteditable="true" id="roti-coklat" class="auto-save">0</span></div>
                <div class="roti-row"><span>VANILLA</span><span contenteditable="true" id="roti-vanilla" class="auto-save">0</span></div>
                <div class="roti-row"><span>BLUEBERRY</span><span contenteditable="true" id="roti-blueberry" class="auto-save">0</span></div>
            </div>
        </div>

        <table>
            <thead><tr><th style="width:150px">NAMA BARANG</th><th>STOK</th><th>MSK</th><th>RSK</th><th>TRJL</th><th>SISA</th></tr></thead>
            <tbody id="inventory-body"></tbody>
        </table>

        <div class="omset-container">
            <div style="flex:1" id="omset-list"></div>
            <div class="total-box">
                <div style="font-size: 9px; margin-bottom: 3px; color: #d4a373;">TOTAL OMSET</div>
                <div id="total-val" style="font-size: 20px; font-weight: 800;">0</div>
            </div>
        </div>

        <div class="footer-section">
            <div class="footer-item">
                <div class="footer-label">CASH AWAL / AKHIR</div>
                <div contenteditable="true" id="save-cash" class="auto-save" style="font-weight: 800; font-size: 11px;">0</div>
            </div>
            <div class="footer-item">
                <div class="footer-label">BERITA ACARA:</div>
                <div contenteditable="true" id="save-berita" class="auto-save" style="font-size: 9px;">-</div>
            </div>
        </div>
    </div>
</div>

<script>
    const manualOnly = ["CUP KECIL", "CUP BESAR", "SUSU UHT", "KRIMER", "SKM", "BASE SUSU", "BASE KOPI", "ROTI"];
    const daftarBarang = ["CUP KECIL", "CUP BESAR", "CUP HOT", "BOTOL 1 LITER", "BOTOL 500 ML", "GULA AREN", "GULA PUTIH", "KOPI", "SUSU UHT", "KRIMER", "SEA SALT CREAM", "FN", "SKM", "HERSHEY'S", "REMON", "SEDOTAN KECIL", "SEDOTAN BESAR", "PLASTIK ISI 2", "PLASTIK ISI 1", "PLASTIK BESAR", "CUP SEALER", "BASE SUSU", "BASE KOPI", "ROTI"];

    function jalankanSistemEstafet() {
        const tglSkrg = new Date().toLocaleDateString('id-ID');
        const tglTerakhir = localStorage.getItem('app_last_date');
        
        const opsi = { weekday: 'long', day: 'numeric', month: 'numeric', year: 'numeric' };
        const hariIni = new Date().toLocaleDateString('id-ID', opsi).split(', ');
        document.getElementById('lbl-hari').innerText = hariIni[0].toUpperCase();
        document.getElementById('lbl-tgl').innerText = hariIni[1];

        if (tglTerakhir && tglTerakhir !== tglSkrg) {
            daftarBarang.forEach((nama, i) => {
                const sisaKemarin = localStorage.getItem(`sisa-${i}`) || "0";
                localStorage.setItem(`stok-${i}`, sisaKemarin);
                localStorage.setItem(`sisa-${i}`, manualOnly.includes(nama) ? "0" : sisaKemarin);
                localStorage.setItem(`msk-${i}`, "0");
                localStorage.setItem(`rsk-${i}`, "0");
                localStorage.setItem(`trjl-${i}`, "0");
            });
            localStorage.setItem('app_last_date', tglSkrg);
        }
        tampilkanTabel();
    }

    function tampilkanTabel() {
        const tbody = document.getElementById('inventory-body');
        tbody.innerHTML = "";
        daftarBarang.forEach((nama, i) => {
            const isManual = manualOnly.includes(nama);
            const valStok = localStorage.getItem(`stok-${i}`) || "0";
            const valSisa = localStorage.getItem(`sisa-${i}`) || (isManual ? "0" : valStok);

            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="col-nama">${nama}</td>
                <td contenteditable="true" class="cell-save" data-id="stok-${i}">${valStok}</td>
                <td contenteditable="true" class="cell-save" data-id="msk-${i}">0</td>
                <td contenteditable="true" class="cell-save" data-id="rsk-${i}">0</td>
                <td contenteditable="true" class="cell-save" data-id="trjl-${i}">0</td>
                <td contenteditable="true" class="cell-save" data-id="sisa-${i}">${valSisa}</td>`;
            tbody.appendChild(tr);
        });

        const omsets = ["CASH", "TRANSFER", "GRAB", "QRIS/OVO", "SHOPEE", "COJEK", "GOPAY"];
        const oList = document.getElementById('omset-list');
        oList.innerHTML = "";
        omsets.forEach((o, i) => {
            const saved = localStorage.getItem(`omset-${i}`) || "0";
            oList.innerHTML += `<div class="omset-row"><div class="omset-label">${o}</div><div class="omset-input cell-save" contenteditable="true" data-id="omset-${i}">${saved}</div></div>`;
        });

        document.querySelectorAll('.cell-save, .auto-save').forEach(el => {
            const id = el.getAttribute('data-id') || el.id;
            const saved = localStorage.getItem(id);
            if(saved !== null) el.innerText = saved;
            el.addEventListener('input', () => {
                localStorage.setItem(id, el.innerText);
                hitungTotal();
            });
        });
        hitungTotal();
    }

    function hitungTotal() {
        let t = 0;
        document.querySelectorAll('.omset-input').forEach(i => t += parseInt(i.innerText.replace(/\./g, '')) || 0);
        document.getElementById('total-val').innerText = t.toLocaleString('id-ID');
    }

    function prosesKeGambar() {
        const area = document.getElementById('area-laporan');
        area.classList.add('white-mode');
        html2canvas(area, { scale: 2 }).then(canvas => {
            document.getElementById('preview-img').src = canvas.toDataURL();
            document.getElementById('overlay').style.display = 'flex';
            area.classList.remove('white-mode');
        });
    }
</script>
</body>
</html>
