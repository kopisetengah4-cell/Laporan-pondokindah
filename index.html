<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kopi Setengah-4 | Auto-Sync System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap');
        html, body { background-color: #111; color: #fff; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        #area-laporan { background: #fff; padding: 15px; width: 500px; margin: 10px auto; box-sizing: border-box; border: 2px solid #000; color: #000; }
        .main-title { text-align: center; font-size: 18px; font-weight: 800; margin-bottom: 15px; }
        .top-section { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .info-group { font-size: 11px; font-weight: 800; }
        .info-val { border-bottom: 1px solid #000; min-width: 80px; display: inline-block; padding-left: 5px; }
        .roti-box { width: 150px; border: 2px solid #000; }
        .roti-header { background: #000; color: #fff; text-align: center; font-weight: 800; padding: 4px; font-size: 10px; }
        .roti-row { display: flex; justify-content: space-between; padding: 4px 8px; border-bottom: 1px solid #ccc; font-size: 10px; font-weight: 800; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 10px; border: 2px solid #000; }
        th { background: #000; color: #fff; padding: 6px 2px; border: 1px solid #000; font-size: 9px; }
        td { border: 1px solid #000; padding: 5px 2px; font-weight: 800; text-align: center; outline: none; }
        .col-nama { text-align: left !important; padding-left: 8px; background: #f2f2f2; width: 35%; }
        .omset-container { display: flex; border: 2px solid #000; margin-top: 15px; }
        .total-box { width: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; color: #fff; }
        .controls { text-align: center; padding: 20px; background: #222; position: sticky; top: 0; z-index: 100; }
        .btn-gen { background: #4285F4; color: #fff; padding: 15px 30px; font-weight: 800; border-radius: 10px; border: none; cursor: pointer; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        #preview-img { max-width: 95%; border: 3px solid #fff; margin-bottom: 15px; }
    </style>
</head>
<body onload="cekDanMuatData()">

<div class="controls">
    <button onclick="prosesLaporan()" class="btn-gen">GENERATE & SIMPAN DATA</button>
</div>

<div id="overlay" onclick="this.style.display='none'">
    <p style="color:#fff; font-weight:800;">TAHAN LAMA GAMBAR -> DOWNLOAD IMAGE</p>
    <img id="preview-img" src="">
</div>

<div id="area-laporan">
    <div class="main-title">KOPI SETENGAH-4</div>
    <div class="top-section">
        <div class="info-group">
            <div>HARI : <span id="label-hari" class="info-val">...</span></div>
            <div>TGL : <span id="label-tgl" class="info-val">...</span></div>
            <div>CABANG : <span class="info-val">PONDOK INDAH</span></div>
        </div>
        <div class="roti-box">
            <div class="roti-header">SISA ROTI (FISIK)</div>
            <div class="roti-row"><span>COKLAT</span><span contenteditable="true" id="roti-coklat">18</span></div>
            <div class="roti-row"><span>VANILLA</span><span contenteditable="true" id="roti-vanilla">16</span></div>
            <div class="roti-row"><span>BLUEBERRY</span><span contenteditable="true" id="roti-blueberry">14</span></div>
        </div>
    </div>

    <table>
        <thead>
            <tr><th class="col-nama">NAMA BARANG</th><th>STOK</th><th>MSK</th><th>RSK</th><th>TRJL</th><th>SISA</th></tr>
        </thead>
        <tbody id="inventory-body"></tbody>
    </table>

    <div class="omset-container">
        <div style="flex:1" id="omset-list"></div>
        <div class="total-box">
            <div style="font-size: 10px;">TOTAL OMSET</div>
            <div id="total-val" style="font-size: 24px; font-weight: 800;">0</div>
        </div>
    </div>
</div>

<script>
    const manualItems = ["CUP KECIL", "CUP BESAR", "SUSU UHT", "KRIMER", "SKM", "BASE SUSU", "BASE KOPI", "ROTI"];
    
    // Data awal jika storage kosong (Base 28 Maret)
    const defaultStok = {
        "CUP KECIL": "1.156", "CUP BESAR": "133", "CUP HOT": "127", "BOTOL 1 LITER": "22",
        "BOTOL 500 ML": "49", "GULA AREN": "4½", "GULA PUTIH": "1½", "KOPI": "15",
        "SUSU UHT": "23/961", "KRIMER": "10/660", "SEA SALT CREAM": "1/870", "FN": "4/290",
        "SKM": "6/77", "HERSHEY'S": "1/620", "REMON": "27", "SEDOTAN KECIL": "5½",
        "SEDOTAN BESAR": "2½", "PLASTIK ISI 2": "5", "PLASTIK ISI 1": "7", "PLASTIK BESAR": "7",
        "CUP SEALER": "1", "BASE SUSU": "2.100", "BASE KOPI": "1.100", "ROTI": "48"
    };

    function cekDanMuatData() {
        const tglSekarang = new Date().toLocaleDateString('id-ID');
        const tglTerakhir = localStorage.getItem('last_date');
        const labelHari = ["MINGGU", "SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU"][new Date().getDay()];
        
        document.getElementById('label-hari').innerText = labelHari;
        document.getElementById('label-tgl').innerText = tglSekarang;

        let stokHariIni = JSON.parse(localStorage.getItem('saved_stok')) || defaultStok;

        // JIKA HARI BERGANTI: Pindahkan Sisa ke Stok Awal
        if (tglTerakhir && tglTerakhir !== tglSekarang) {
            const sisaKemarin = JSON.parse(localStorage.getItem('last_sisa_stok'));
            if (sisaKemarin) stokHariIni = sisaKemarin;
        }

        renderTabel(stokHariIni);
        localStorage.setItem('last_date', tglSekarang);
    }

    function renderTabel(stokData) {
        const tbody = document.getElementById('inventory-body');
        tbody.innerHTML = "";
        Object.keys(stokData).forEach(nama => {
            const isManual = manualItems.includes(nama);
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="col-nama">${nama}</td>
                <td contenteditable="true" class="stok-awal">${stokData[nama]}</td>
                <td contenteditable="true">0</td>
                <td contenteditable="true">0</td>
                <td contenteditable="true">0</td>
                <td contenteditable="true" class="sisa-final">${isManual ? "" : stokData[nama]}</td>
            `;
            tbody.appendChild(tr);
        });
        
        // Load list omset
        const omsets = ["CASH", "TRANSFER", "GRAB FOOD", "QRIS", "SHOPEE FOOD", "GOJEK", "GOPAY"];
        const oList = document.getElementById('omset-list');
        oList.innerHTML = "";
        omsets.forEach(o => {
            oList.innerHTML += `<div style="display:flex; border-bottom:1px solid #eee; padding:5px; font-size:10px; font-weight:800;">
                <div style="width:120px">${o}</div><div class="omset-input" contenteditable="true">0</div></div>`;
        });
    }

    function prosesLaporan() {
        // Simpan data Sisa Stok hari ini untuk besok
        const sisaSekarang = {};
        document.querySelectorAll('#inventory-body tr').forEach(tr => {
            const nama = tr.cells[0].innerText;
            const sisa = tr.cells[5].innerText;
            sisaSekarang[nama] = sisa;
        });
        localStorage.setItem('last_sisa_stok', JSON.stringify(sisaSekarang));

        html2canvas(document.getElementById('area-laporan'), { scale: 3 }).then(canvas => {
            document.getElementById('preview-img').src = canvas.toDataURL("image/png");
            document.getElementById('overlay').style.display = 'flex';
        });
    }
</script>
</body>
</html>
