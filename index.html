<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PI Dashboard | Kopi Setengah-4</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { background-color: #000; color: #d4af37; font-family: sans-serif; margin: 0; padding: 2px; display: flex; flex-direction: column; align-items: center; }
        .top-nav { width: 100%; max-width: 600px; display: flex; justify-content: space-between; margin-bottom: 5px; gap: 3px; }
        .btn-main { padding: 10px 6px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px; flex: 1; color: white; text-transform: uppercase; }
        .btn-wa { background-color: #25D366; }
        .btn-menu { background-color: #d4af37; color: #000; }
        .btn-new { background-color: #007bff; }

        .container { width: 100%; max-width: 600px; padding-bottom: 20px; }
        .header-title { text-align: center; font-size: 14px; font-weight: bold; margin: 10px 0; }

        /* Tabel Utama */
        table.main-table { width: 100%; border-collapse: collapse; font-size: 10px; table-layout: fixed; background: #000; }
        table.main-table th { background-color: #1a1a1a; border: 1px solid #333; padding: 4px 0; color: #888; font-size: 8px; }
        table.main-table td { border: 1px solid #333; height: 22px; text-align: center; padding: 0; }
        table.main-table input { background: transparent; border: none; color: white; width: 100%; height: 100%; text-align: center; outline: none; font-size: 11px; }
        .col-nama { width: 38%; text-align: left !important; padding-left: 5px !important; color: #d4af37; font-weight: bold; }

        /* Omset Section */
        .omset-grid { display: grid; grid-template-columns: 1.5fr 1fr; border: 1px solid #333; margin-top: 5px; background: #050505; }
        .omset-row { display: flex; justify-content: space-between; padding: 2px 8px; border-bottom: 1px solid #111; font-size: 10px; align-items: center; }
        .omset-row input { background: transparent; border: none; color: white; width: 80px; text-align: right; outline: none; }
        .omset-total-box { font-size: 28px; font-weight: bold; color: #fff; display: flex; align-items: center; justify-content: center; background: #000; border-left: 1px solid #333; }

        /* Footer Boxes */
        .footer-box { border: 1px solid #333; padding: 5px; text-align: center; background-color: #050505; margin-top: 5px; }
        .footer-box label { font-size: 8px; color: #888; display: block; margin-bottom: 2px; }
        .footer-box input { background: transparent; border: none; color: #fff; width: 100%; text-align: center; font-size: 11px; outline: none; }

        /* Overlay Riwayat & Report */
        #riwayat-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; padding: 20px; box-sizing: border-box; }
        #report-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:2000; overflow-y: auto; padding: 10px; box-sizing: border-box; color: #000; }
        
        /* White Report Styling */
        .white-report-container { background: #fff; width: 360px; margin: 0 auto; padding: 10px; border: 1px solid #000; }
        .white-report-container table { width: 100%; border-collapse: collapse; font-size: 9px; margin-bottom: 5px; }
        .white-report-container th, .white-report-container td { border: 1px solid #000; padding: 2px; text-align: center; color: #000; }
        .white-report-header { text-align: center; font-weight: bold; margin-bottom: 8px; font-size: 12px; border-bottom: 2px solid #000; }
    </style>
</head>
<body>

<div class="top-nav">
    <button class="btn-main btn-wa" onclick="simpanKeFirebase()">SIMPAN DATA</button>
    <button class="btn-main btn-menu" onclick="bukaRiwayat()">RIWAYAT</button>
    <button class="btn-main btn-new" onclick="jalankanNewSistem()">NEW RESET</button>
</div>

<div class="container">
    <div class="header-title">KOPI SETENGAH-4</div>
    
    <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:8px;">
        <div style="flex: 1;">
            TGL: <span id="label-tgl">-</span><br>
            CAB: <select id="main-cabang" onchange="gantiIdentitas()" style="background:#000; color:#fff; border:none; font-size:10px; font-weight:bold;">
                <option value="Pondok Indah">Pondok Indah</option>
                <option value="Cemput">Cemput</option>
                <option value="Otista">Otista</option>
                <option value="Jl.Panjang">Jl.Panjang</option>
                <option value="Tandur">Tandur</option>
                <option value="Menteng">Menteng</option>
            </select><br>
            SHIFT: <select id="main-shift" onchange="gantiIdentitas()" style="background:#000; color:#fff; border:none; font-size:10px; font-weight:bold;">
                <option value="SHIFT 1">SHIFT 1</option>
                <option value="SHIFT 2">SHIFT 2</option>
            </select>
        </div>
        <div style="width: 35%;">
            <table style="width:100%; border-collapse:collapse; font-size:9px; border:1px solid #333;">
                <tr><td colspan="2" style="text-align:center; font-size:7px; color:#888;">SISA ROTI</td></tr>
                <tr><td>COK</td><td><input type="text" id="roti-coklat" style="width:100%; background:transparent; border:none; color:#fff; text-align:center;"></td></tr>
                <tr><td>VAN</td><td><input type="text" id="roti-vanilla" style="width:100%; background:transparent; border:none; color:#fff; text-align:center;"></td></tr>
                <tr><td>BLU</td><td><input type="text" id="roti-blueberry" style="width:100%; background:transparent; border:none; color:#fff; text-align:center;"></td></tr>
            </table>
        </div>
    </div>

    <table class="main-table">
        <thead><tr><th class="col-nama">BARANG</th><th>STOK</th><th>MSK</th><th>RSK</th><th>TRJL</th><th>SISA</th></tr></thead>
        <tbody id="inventory-body"></tbody>
    </table>

    <div class="omset-grid">
        <div id="omset-inputs"></div>
        <div class="omset-total-box" id="display-total">0</div>
    </div>

    <div class="footer-box"><label>CASH AWAL / CASH AKHIR</label><input type="text" id="cash-gabungan"></div>
    <div class="footer-box"><label>BERITA ACARA / NOTE</label><input type="text" id="note"></div>
</div>

<div id="riwayat-modal">
    <h3 style="color:#d4af37; text-align:center;">CARI LAPORAN</h3>
    <input type="date" id="hist-date" style="width:100%; padding:10px; border-radius:5px; border:none;">
    <button class="btn-main btn-new" style="width:100%; margin-top:10px;" onclick="ambilDataRiwayat()">LIHAT LAPORAN</button>
    <button class="btn-main" style="width:100%; margin-top:10px; background:#444;" onclick="tutupRiwayat()">BATAL</button>
</div>

<div id="report-overlay">
    <div style="display:flex; gap:5px; margin-bottom:10px;">
        <button onclick="tutupOverlayLaporan()" style="padding:10px; flex:1;">← KEMBALI</button>
        <button onclick="downloadLaporanGambar()" style="padding:10px; flex:2; background:#e74c3c; color:white; border:none; font-weight:bold;">DOWNLOAD PNG</button>
    </div>
    
    <div class="white-report-container" id="printable-area">
        <div class="white-report-header">
            KOPI SETENGAH-4<br>
            <span id="view-cabang" style="font-size:9px;"></span> | <span id="view-shift" style="font-size:9px;"></span> | <span id="view-tgl" style="font-size:9px;"></span>
        </div>
        <table id="view-table">
            <thead><tr><th style="text-align:left;">BARANG</th><th>STOK</th><th>MSK</th><th>RSK</th><th>TRJL</th><th>SISA</th></tr></thead>
            <tbody id="view-body"></tbody>
        </table>
        <div style="display:flex; border:1px solid #000; margin-top:5px;">
            <div id="view-omset" style="flex:1.2; border-right:1px solid #000; font-size:8px; padding:3px;"></div>
            <div id="view-total" style="flex:1; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:bold;"></div>
        </div>
        <div id="view-cash" style="border:1px solid #000; margin-top:3px; padding:3px; font-size:8px;"></div>
        <div id="view-note" style="border:1px solid #000; margin-top:3px; padding:3px; font-size:8px; min-height:20px;"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDZU6wFZPbBX0di2sAG7ve93ArFgdZ0trw",
        authDomain: "laporan-harian-f096f.firebaseapp.com",
        databaseURL: "https://laporan-harian-f096f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "laporan-harian-f096f",
        storageBucket: "laporan-harian-f096f.firebasestorage.app",
        messagingSenderId: "1063740425135",
        appId: "1:1063740425135:web:2d7a4befce6521d72d255a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const daftarBarang = ["CUP KECIL", "CUP BESAR", "CUP HOT", "BOTOL 1 LITER", "BOTOL 500 ML", "GULA AREN", "GULA PUTIH", "KOPI", "SUSU UHT", "KRIMER", "SEA SALT", "FN", "SKM", "HERSHEY'S", "REMON", "SEDOTAN KEC", "SEDOTAN BSR", "PLASTIK ISI 2", "PLASTIK ISI 1", "PLASTIK BSR", "CUP SEALER", "BASE SUSU", "BASE KOPI", "ROTI"];
    const daftarOmset = ["CASH", "TRANSFER", "GRAB FOOD", "OVO", "SHOPEE FOOD", "SHOPEE PAY", "GOJEK", "GOPAY", "AIRASIA"];

    function inisialisasi() {
        const tbody = document.getElementById('inventory-body');
        daftarBarang.forEach(item => {
            const id = item.replace(/[^A-Z0-9]/ig, "_");
            tbody.innerHTML += `<tr><td class="col-nama">${item}</td><td><input type="text" id="stok_${id}"></td><td><input type="text" id="msk_${id}"></td><td><input type="text" id="rsk_${id}"></td><td><input type="text" id="trjl_${id}"></td><td><input type="text" id="sisa_${id}"></td></tr>`;
        });
        const oDiv = document.getElementById('omset-inputs');
        daftarOmset.forEach(m => { 
            oDiv.innerHTML += `<div class="omset-row"><span>${m}</span><input type="text" class="omset-val" id="o_${m.replace(/[^A-Z0-9]/ig,'_')}" oninput="hitungTotal()"></div>`; 
        });
        document.getElementById('label-tgl').innerText = new Date().toISOString().split('T')[0];
    }

    function hitungTotal() {
        let total = 0;
        document.querySelectorAll('.omset-val').forEach(el => { total += parseInt(el.value.replace(/[^0-9]/g, '')) || 0; });
        document.getElementById('display-total').innerText = total.toLocaleString('id-ID');
    }

    function ambilDataRiwayat() {
        const tgl = document.getElementById('hist-date').value;
        const cab = document.getElementById('main-cabang').value;
        const shf = document.getElementById('main-shift').value;
        if(!tgl) return alert("Pilih Tanggal!");

        db.ref('Laporan/' + tgl + '/' + cab + '/' + shf).once('value', (s) => {
            if(s.val()) {
                renderLaporanPutih(s.val(), tgl, cab, shf);
                tutupRiwayat();
                document.getElementById('report-overlay').style.display = 'block';
            } else { alert("Data tidak ditemukan."); }
        });
    }

    function renderLaporanPutih(d, tgl, cab, shf) {
        document.getElementById('view-cabang').innerText = cab.toUpperCase();
        document.getElementById('view-tgl').innerText = tgl;
        document.getElementById('view-shift').innerText = shf;
        document.getElementById('view-total').innerText = d.total || "0";
        document.getElementById('view-cash').innerText = "CASH AWAL/AKHIR: " + (d['cash-gabungan'] || "-");
        document.getElementById('view-note').innerText = "NOTE: " + (d.note || "-");

        let tableHtml = "";
        daftarBarang.forEach(item => {
            const id = item.replace(/[^A-Z0-9]/ig, "_");
            tableHtml += `<tr><td style="text-align:left; font-weight:bold;">${item}</td><td>${d['stok_'+id]||''}</td><td>${d['msk_'+id]||''}</td><td>${d['rsk_'+id]||''}</td><td>${d['trjl_'+id]||''}</td><td>${d['sisa_'+id]||''}</td></tr>`;
        });
        document.getElementById('view-body').innerHTML = tableHtml;

        let omsetHtml = "";
        daftarOmset.forEach(m => {
            const id = 'o_' + m.replace(/[^A-Z0-9]/ig,'_');
            omsetHtml += `<div style="display:flex; justify-content:space-between;"><span>${m}</span><span>${d[id]||'0'}</span></div>`;
        });
        document.getElementById('view-omset').innerHTML = omsetHtml;
    }

    function downloadLaporanGambar() {
        html2canvas(document.getElementById('printable-area'), { scale: 3 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Report_${document.getElementById('view-cabang').innerText}_${document.getElementById('view-tgl').innerText}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }

    function simpanKeFirebase() {
        const tgl = document.getElementById('label-tgl').innerText;
        const cab = document.getElementById('main-cabang').value;
        const shf = document.getElementById('main-shift').value;
        const data = {};
        document.querySelectorAll('input').forEach(el => { if(el.id) data[el.id] = el.value; });
        data.total = document.getElementById('display-total').innerText;
        db.ref('Laporan/' + tgl + '/' + cab + '/' + shf).set(data);
        alert("Data Tersimpan!");
    }

    function tutupRiwayat() { document.getElementById('riwayat-modal').style.display = 'none'; }
    function bukaRiwayat() { document.getElementById('riwayat-modal').style.display = 'block'; }
    function tutupOverlayLaporan() { document.getElementById('report-overlay').style.display = 'none'; }
    function gantiIdentitas() { /* Refresh view jika perlu */ }

    window.onload = inisialisasi;
</script>
</body>
</html>
