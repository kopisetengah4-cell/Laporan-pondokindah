<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PI Dashboard | Kopi Setengah-4</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { background-color: #000; color: #d4af37; font-family: sans-serif; margin: 0; padding: 2px; display: flex; flex-direction: column; align-items: center; }
        .top-nav { width: 100%; max-width: 600px; display: flex; justify-content: space-between; margin-bottom: 5px; gap: 3px; }
        .btn-main { padding: 12px 6px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px; flex: 1; color: white; text-transform: uppercase; }
        .btn-wa { background-color: #25D366; }
        .btn-menu { background-color: #d4af37; color: #000; }
        .btn-reset { background-color: #e74c3c; }

        .container { width: 100%; max-width: 600px; padding-bottom: 20px; }
        
        table.main-table { width: 100%; border-collapse: collapse; font-size: 10px; table-layout: fixed; background: #000; }
        table.main-table th { background-color: #1a1a1a; border: 1px solid #333; padding: 6px 0; color: #888; font-size: 8px; }
        .col-nama { width: 35%; text-align: left !important; padding-left: 5px !important; color: #d4af37; font-weight: bold; }
        .col-data { width: 13%; }
        table.main-table td { border: 1px solid #333; height: 28px; text-align: center; padding: 0; }
        table.main-table input { background: transparent; border: none; color: white; width: 100%; height: 100%; text-align: center; outline: none; font-size: 13px; }

        .omset-grid { display: grid; grid-template-columns: 1.5fr 1fr; border: 1px solid #333; margin-top: 5px; background: #050505; }
        .omset-row { display: flex; justify-content: space-between; padding: 5px 8px; border-bottom: 1px solid #111; font-size: 10px; align-items: center; color: #fff; }
        .omset-row input { background: transparent; border: none; color: white; width: 90px; text-align: right; outline: none; font-size: 12px; }
        .omset-total-box { font-size: 28px; font-weight: bold; color: #fff; display: flex; align-items: center; justify-content: center; background: #000; border-left: 1px solid #333; }

        .bottom-section { display: flex; gap: 5px; margin-top: 5px; width: 100%; }
        .footer-box { border: 1px solid #333; padding: 5px; text-align: center; background-color: #050505; flex: 1; }
        .footer-box label { font-size: 8px; color: #888; border-bottom: 1px solid #222; margin-bottom: 2px; display: block; }
        .footer-box input { background: transparent; border: none; color: #fff; width: 100%; text-align: center; font-size: 11px; outline: none; }

        #report-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:4000; padding: 10px; overflow-y: auto; }
        .report-container { background: #000; width: 360px; margin: 0 auto; padding: 10px; border: 1px solid #333; }
    </style>
</head>
<body onload="initApp()">

<div class="top-nav">
    <button class="btn-main btn-wa" onclick="generateReport()">SIMPAN DATA</button>
    <button class="btn-main btn-menu" onclick="document.getElementById('riwayat-modal').style.display='block'">RIWAYAT</button>
    <button class="btn-main btn-reset" onclick="resetAll()">RESET</button>
</div>

<div class="container">
    <div style="text-align: center; font-size: 14px; font-weight: bold; margin: 10px 0;">KOPI SETENGAH-4</div>
    
    <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:8px;">
        <div style="flex: 1;">
            <span id="txt-hari" style="font-weight:bold; display:block; font-size: 12px;">-</span>
            TGL: <span id="txt-tgl">-</span><br>
            CAB: <select id="sel-cab" onchange="switchLoc()" style="background:#000; color:#fff; border:none; font-weight:bold;">
                <option value="Tandur">Tandur</option>
                <option value="Kebon Jeruk">Kebon Jeruk</option>
                <option value="Pondok Indah">Pondok Indah</option>
                <option value="Otista">Otista</option>
                <option value="Cemput">Cemput</option>
                <option value="Menteng">Menteng</option>
            </select><br>
            SHIFT: <select id="sel-shf" onchange="switchLoc()" style="background:#000; color:#fff; border:none; font-weight:bold;">
                <option value="SHIFT 1">SHIFT 1</option>
                <option value="SHIFT 2">SHIFT 2</option>
            </select>
        </div>
        <div style="width: 30%;">
            <table style="width:100%; border-collapse: collapse; font-size: 9px; border: 1px solid #333;">
                <tr style="background:#1a1a1a; color:#888;"><td colspan="2" style="text-align:center;">SISA ROTI</td></tr>
                <tr><td>COK</td><td><input type="text" id="r_coklat" oninput="handleInput()"></td></tr>
                <tr><td>VAN</td><td><input type="text" id="r_vanilla" oninput="handleInput()"></td></tr>
                <tr><td>BLU</td><td><input type="text" id="r_blueberry" oninput="handleInput()"></td></tr>
            </table>
        </div>
    </div>

    <table class="main-table">
        <thead>
            <tr><th class="col-nama">BARANG</th><th class="col-data">STOK</th><th class="col-data">MSK</th><th class="col-data">RSK</th><th class="col-data">TRJL</th><th class="col-data">SISA</th></tr>
        </thead>
        <tbody id="body-items"></tbody>
    </table>

    <div class="omset-grid">
        <div id="body-omset"></div>
        <div class="omset-total-box" id="val-total">0</div>
    </div>

    <div class="bottom-section">
        <div class="footer-box"><label>CASH AWAL/AKHIR</label><input type="text" id="f_cash" oninput="handleInput()"></div>
        <div class="footer-box"><label>NOTE</label><input type="text" id="f_note" oninput="handleInput()"></div>
    </div>
</div>

<div id="report-overlay">
    <div style="display:flex; gap:5px; margin-bottom:10px; width: 360px; margin: 0 auto;">
        <button onclick="document.getElementById('report-overlay').style.display='none'" style="padding:10px; flex:1;">KEMBALI</button>
        <button onclick="doDownload()" style="padding:10px; flex:2; background:#e74c3c; color:white; border:none; font-weight:bold;">DOWNLOAD PNG</button>
    </div>
    <div class="report-container" id="report-area">
        <div id="report-content"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDZU6wFZPbBX0di2sAG7ve93ArFgdZ0trw",
        authDomain: "laporan-harian-f096f.firebaseapp.com",
        databaseURL: "https://laporan-harian-f096f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "laporan-harian-f096f",
        storageBucket: "laporan-harian-f096f.firebasestorage.app",
        messagingSenderId: "1063740425135",
        appId: "1:1063740425135:web:2d7a4befce6521d72d255a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const items = ["CUP KECIL", "CUP BESAR", "CUP HOT", "BOTOL 1 LITER", "BOTOL 500 ML", "GULA AREN", "GULA PUTIH", "KOPI", "SUSU UHT", "KRIMER", "SEA SALT", "FN", "SKM", "HERSHEY'S", "REMON", "SEDOTAN KEC", "SEDOTAN BSR", "PLASTIK ISI 2", "PLASTIK ISI 1", "PLASTIK BSR", "CUP SEALER", "BASE SUSU", "BASE KOPI", "ROTI"];
    const omsets = ["CASH", "TRANSFER", "GRAB FOOD", "OVO", "SHOPEE FOOD", "SHOPEE PAY", "GOJEK", "GOPAY", "AIRASIA"];

    function initApp() {
        const now = new Date();
        const tgl = now.toISOString().split('T')[0];
        document.getElementById('txt-tgl').innerText = tgl;
        const hariArr = ["MINGGU", "SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU"];
        document.getElementById('txt-hari').innerText = hariArr[now.getDay()];

        const c = localStorage.getItem('c_pref') || "Tandur";
        const s = localStorage.getItem('s_pref') || "SHIFT 1";
        document.getElementById('sel-cab').value = c;
        document.getElementById('sel-shf').value = s;

        renderUI();
        muatData(tgl, c, s);
    }

    function renderUI() {
        const b = document.getElementById('body-items'); b.innerHTML = "";
        items.forEach(i => {
            const id = i.replace(/[^A-Z0-9]/ig, "_");
            b.innerHTML += `<tr><td class="col-nama">${i}</td>
                <td><input type="text" id="stok_${id}" oninput="handleInput()"></td>
                <td><input type="text" id="msk_${id}" oninput="handleInput()"></td>
                <td><input type="text" id="rsk_${id}" oninput="handleInput()"></td>
                <td><input type="text" id="trjl_${id}" oninput="handleInput()"></td>
                <td><input type="text" id="sisa_${id}" oninput="handleInput()"></td></tr>`;
        });

        const o = document.getElementById('body-omset'); o.innerHTML = "";
        omsets.forEach(m => {
            o.innerHTML += `<div class="omset-row"><span>${m}</span><input type="text" class="i-omset" id="o_${m.replace(/[^A-Z0-9]/ig,'_')}" oninput="handleInput()"></div>`;
        });
    }

    function muatData(tgl, cab, shf) {
        // 1. Ambil dari Draft Lokal DULU (Supaya saat refresh data TIDAK HILANG)
        const draft = localStorage.getItem(`draft_${cab}_${shf}`);
        if(draft) {
            const d = JSON.parse(draft);
            Object.keys(d).forEach(k => { if(document.getElementById(k)) document.getElementById(k).value = d[k]; });
        }

        // 2. Tarik sisa stok dari shift sebelumnya HANYA jika kolom stok masih kosong
        let path;
        if(shf === "SHIFT 2") {
            path = `LiveSync/${tgl}/${cab}/SHIFT 1`;
        } else {
            const kmrn = new Date(); kmrn.setDate(kmrn.getDate()-1);
            path = `LiveSync/${kmrn.toISOString().split('T')[0]}/${cab}/SHIFT 2`;
        }

        db.ref(path).once('value', s => {
            const data = s.val();
            if(data) {
                items.forEach(i => {
                    const idStok = "stok_" + i.replace(/[^A-Z0-9]/ig, "_");
                    const idSisa = "sisa_" + i.replace(/[^A-Z0-9]/ig, "_");
                    const inputEl = document.getElementById(idStok);
                    // Hanya isi otomatis jika input masih kosong
                    if(inputEl && !inputEl.value) inputEl.value = data[idSisa] || "";
                });
            }
            calcTotal();
        });
    }

    function handleInput() {
        const c = document.getElementById('sel-cab').value;
        const s = document.getElementById('sel-shf').value;
        const t = document.getElementById('txt-tgl').innerText;
        const data = {};
        document.querySelectorAll('input').forEach(i => { if(i.id) data[i.id] = i.value; });
        
        // Simpan ke Lokal & Firebase seketika
        localStorage.setItem(`draft_${c}_${s}`, JSON.stringify(data));
        db.ref('LiveSync/' + t + '/' + c + '/' + s).set(data);
        calcTotal();
    }

    function calcTotal() {
        let t = 0;
        document.querySelectorAll('.i-omset').forEach(i => { t += parseInt(i.value.replace(/[^0-9]/g,'')) || 0; });
        document.getElementById('val-total').innerText = t.toLocaleString('id-ID');
    }

    function switchLoc() {
        localStorage.setItem('c_pref', document.getElementById('sel-cab').value);
        localStorage.setItem('s_pref', document.getElementById('sel-shf').value);
        location.reload();
    }

    function generateReport() {
        const t = document.getElementById('txt-tgl').innerText;
        const c = document.getElementById('sel-cab').value;
        const s = document.getElementById('sel-shf').value;
        const data = { total: document.getElementById('val-total').innerText };
        document.querySelectorAll('input').forEach(i => { if(i.id) data[i.id] = i.value; });

        db.ref('Laporan/' + t + '/' + c + '/' + s).set(data).then(() => {
            const h = `<div style="background:#000; padding:15px; border:1px solid #d4af37; color:#fff;">
                <div style="text-align:center; color:#d4af37; font-weight:bold; margin-bottom:10px;">KOPI SETENGAH-4</div>
                <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:10px;">
                    <div>TGL: ${t}<br>CAB: ${c}<br>SHIFT: ${s}</div>
                </div>
                <table style="width:100%; border-collapse:collapse; font-size:9px; color:#fff; border:1px solid #333;">
                    <tr style="background:#1a1a1a; color:#888;"><th>BARANG</th><th>STOK</th><th>MSK</th><th>TRJL</th><th>SISA</th></tr>`;
            items.forEach(i => {
                const id = i.replace(/[^A-Z0-9]/ig, "_");
                h += `<tr><td style="color:#d4af37; border:1px solid #333; font-weight:bold;">${i}</td>
                    <td style="text-align:center; border:1px solid #333;">${data['stok_'+id]||0}</td>
                    <td style="text-align:center; border:1px solid #333;">${data['msk_'+id]||0}</td>
                    <td style="text-align:center; border:1px solid #333;">${data['trjl_'+id]||0}</td>
                    <td style="text-align:center; border:1px solid #333; font-weight:bold;">${data['sisa_'+id]||0}</td></tr>`;
            });
            document.getElementById('report-content').innerHTML = h + `</table><div style="text-align:center; padding:10px; font-size:20px; font-weight:bold;">Total: Rp ${data.total}</div></div>`;
            document.getElementById('report-overlay').style.display = 'block';
        });
    }

    function doDownload() {
        html2canvas(document.getElementById('report-area'), { backgroundColor: "#000", scale: 3 }).then(c => {
            const a = document.createElement('a'); a.download = 'Laporan.png'; a.href = c.toDataURL(); a.click();
        });
    }

    function resetAll() { if(confirm("Hapus semua data di halaman ini?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
