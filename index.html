<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PI Dashboard | Kopi Setengah-4</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { background-color: #000; color: #d4af37; font-family: sans-serif; margin: 0; padding: 2px; display: flex; flex-direction: column; align-items: center; }
        .top-nav { width: 100%; max-width: 600px; display: flex; justify-content: space-between; margin-bottom: 5px; gap: 3px; }
        .btn-main { padding: 10px 6px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px; flex: 1; color: white; text-transform: uppercase; }
        .btn-wa { background-color: #25D366; }
        .btn-menu { background-color: #d4af37; color: #000; }
        .btn-reset { background-color: #e74c3c; }

        .container { width: 100%; max-width: 600px; padding-bottom: 20px; }
        
        table.main-table { width: 100%; border-collapse: collapse; font-size: 10px; table-layout: fixed; background: #000; }
        table.main-table th { background-color: #1a1a1a; border: 1px solid #333; padding: 4px 0; color: #888; font-size: 8px; }
        .col-nama { width: 35%; text-align: left !important; padding-left: 5px !important; color: #d4af37; font-weight: bold; }
        .col-data { width: 13%; }
        table.main-table td { border: 1px solid #333; height: 22px; text-align: center; padding: 0; }
        table.main-table input { background: transparent; border: none; color: white; width: 100%; height: 100%; text-align: center; outline: none; font-size: 11px; }

        /* Tabel Roti Tetap Seperti Semula */
        .roti-container { width: 26%; }
        .roti-table-main { width: 100%; border-collapse: collapse; font-size: 8px; border: 1px solid #333; table-layout: fixed; }
        .roti-table-main td { border: 1px solid #333; height: 20px; width: 50%; }
        .roti-table-main input { width: 100%; background: transparent; border: none; color: #fff; text-align: center; outline: none; }

        .omset-grid { display: grid; grid-template-columns: 1.5fr 1fr; border: 1px solid #333; margin-top: 5px; background: #050505; }
        .omset-row { display: flex; justify-content: space-between; padding: 2px 8px; border-bottom: 1px solid #111; font-size: 10px; align-items: center; }
        .omset-row input { background: transparent; border: none; color: white; width: 80px; text-align: right; outline: none; }
        .omset-total-box { font-size: 28px; font-weight: bold; color: #fff; display: flex; align-items: center; justify-content: center; background: #000; border-left: 1px solid #333; }

        .bottom-section { display: flex; gap: 5px; margin-top: 5px; width: 100%; }
        .footer-box { border: 1px solid #333; padding: 5px; text-align: center; background-color: #050505; flex: 1; }
        .footer-box label { font-size: 8px; color: #888; display: block; margin-bottom: 2px; }
        .footer-box input { background: transparent; border: none; color: #fff; width: 100%; text-align: center; font-size: 11px; outline: none; }

        #report-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#f0f0f0; z-index:2000; overflow-y: auto; padding: 10px; box-sizing: border-box; color: #000; }
        .white-report-container { background: #fff; width: 360px; margin: 0 auto; padding: 10px; border: 1px solid #000; }
        
        #riwayat-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; padding: 20px; box-sizing: border-box; }
        .modal-content { max-width: 400px; margin: 0 auto; background: #111; padding: 15px; border: 1px solid #d4af37; border-radius: 8px; }
        .modal-content select, .modal-content input { width: 100%; padding: 10px; margin-bottom: 10px; background: #000; color: #fff; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="top-nav">
    <button class="btn-main btn-wa" onclick="simpanDanTampilkanLaporan()">SIMPAN DATA</button>
    <button class="btn-main btn-menu" onclick="bukaRiwayat()">RIWAYAT</button>
    <button class="btn-main btn-reset" onclick="resetSemuaRiwayat()">RESET RIWAYAT</button>
</div>

<div class="container">
    <div style="text-align: center; font-size: 14px; font-weight: bold; margin: 10px 0;">KOPI SETENGAH-4</div>
    
    <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:8px;">
        <div style="flex: 1;">
            <span id="label-hari" style="font-weight:bold; display:block;">-</span>
            TGL: <span id="label-tgl">-</span><br>
            CAB: <select id="main-cabang" onchange="simpanKunciCabang()" style="background:#000; color:#fff; border:none; font-size:10px; font-weight:bold;">
                <option value="Tandur">Tandur</option>
                <option value="Kebon Jeruk">Kebon Jeruk</option>
                <option value="Pondok Indah">Pondok Indah</option>
                <option value="Otista">Otista</option>
                <option value="Cemput">Cemput</option>
                <option value="Menteng">Menteng</option>
            </select><br>
            SHIFT: <select id="main-shift" onchange="simpanKunciCabang()" style="background:#000; color:#fff; border:none; font-size:10px; font-weight:bold;">
                <option value="SHIFT 1">SHIFT 1</option>
                <option value="SHIFT 2">SHIFT 2</option>
            </select>
        </div>
        <div class="roti-container">
            <table class="roti-table-main">
                <tr><td colspan="2" style="text-align:center; color:#888;">SISA ROTI</td></tr>
                <tr><td>COKLAT</td><td><input type="text" id="roti-coklat" oninput="autoSave()"></td></tr>
                <tr><td>VANILLA</td><td><input type="text" id="roti-vanilla" oninput="autoSave()"></td></tr>
                <tr><td>BLUEBERRY</td><td><input type="text" id="roti-blueberry" oninput="autoSave()"></td></tr>
            </table>
        </div>
    </div>

    <table class="main-table">
        <thead>
            <tr><th class="col-nama">BARANG</th><th class="col-data">STOK</th><th class="col-data">MSK</th><th class="col-data">RSK</th><th class="col-data">TRJL</th><th class="col-data">SISA</th></tr>
        </thead>
        <tbody id="inventory-body"></tbody>
    </table>

    <div class="omset-grid">
        <div id="omset-inputs"></div>
        <div class="omset-total-box" id="display-total">0</div>
    </div>

    <div class="bottom-section">
        <div class="footer-box"><label>CASH AWAL/AKHIR</label><input type="text" id="cash-gabungan" oninput="autoSave()"></div>
        <div class="footer-box"><label>BERITA ACARA / NOTE</label><input type="text" id="note" oninput="autoSave()"></div>
    </div>
</div>

<div id="report-overlay">
    <div style="display:flex; gap:5px; margin-bottom:10px; width: 360px; margin: 0 auto;">
        <button onclick="tutupOverlayLaporan()" style="padding:10px; flex:1;">KEMBALI</button>
        <button onclick="downloadLaporanGambar()" style="padding:10px; flex:2; background:#e74c3c; color:white; border:none; font-weight:bold;">DOWNLOAD PNG</button>
    </div>
    
    <div class="white-report-container" id="printable-area">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px; align-items: flex-end;">
            <div style="font-size: 10px; line-height: 1.3; font-weight: bold;">
                <span id="view-hari" style="text-transform: uppercase;"></span><br>
                TANGGAL: <span id="view-tgl"></span><br>
                CABANG: <span id="view-cabang"></span><br>
                SHIFT: <span id="view-shift"></span>
            </div>
            <div style="width: 26%;">
                <table style="width: 100%; border-collapse: collapse; font-size: 8px;">
                    <tr><th colspan="2" style="border:1px solid #000;">SISA ROTI</th></tr>
                    <tr><td style="border:1px solid #000;">COK</td><td id="view-r-cok" style="border:1px solid #000; text-align:center;"></td></tr>
                    <tr><td style="border:1px solid #000;">VAN</td><td id="view-r-van" style="border:1px solid #000; text-align:center;"></td></tr>
                    <tr><td style="border:1px solid #000;">BLU</td><td id="view-r-blu" style="border:1px solid #000; text-align:center;"></td></tr>
                </table>
            </div>
        </div>
        <table style="width: 100%; border-collapse: collapse; font-size: 9px;">
            <thead>
                <tr><th style="border:1px solid #000; text-align:left;">BARANG</th><th style="border:1px solid #000;">STOK</th><th style="border:1px solid #000;">MSK</th><th style="border:1px solid #000;">RSK</th><th style="border:1px solid #000;">TRJL</th><th style="border:1px solid #000;">SISA</th></tr>
            </thead>
            <tbody id="view-body"></tbody>
        </table>
        <div style="display:flex; border:1px solid #000; margin-top:5px;">
            <div id="view-omset" style="flex:1.2; border-right:1px solid #000; font-size:8px; padding:3px;"></div>
            <div id="view-total" style="flex:1; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:bold;"></div>
        </div>
        <div style="display:flex; gap:3px; margin-top:3px;">
            <div id="view-cash" style="flex:1; border:1px solid #000; padding:3px; font-size:8px; font-weight:bold;"></div>
            <div id="view-note" style="flex:1; border:1px solid #000; padding:3px; font-size:8px; font-weight:bold;"></div>
        </div>
    </div>
</div>

<div id="riwayat-modal">
    <div class="modal-content">
        <h3 style="color:#d4af37; text-align:center; margin-top:0;">LIHAT RIWAYAT</h3>
        <select id="hist-cabang">
            <option value="Tandur">Tandur</option>
            <option value="Kebon Jeruk">Kebon Jeruk</option>
            <option value="Pondok Indah">Pondok Indah</option>
            <option value="Otista">Otista</option>
            <option value="Cemput">Cemput</option>
            <option value="Menteng">Menteng</option>
        </select>
        <select id="hist-shift">
            <option value="SHIFT 1">SHIFT 1</option>
            <option value="SHIFT 2">SHIFT 2</option>
        </select>
        <input type="date" id="hist-date">
        <button class="btn-main" style="width:100%; background:#007bff;" onclick="ambilDataRiwayat()">LIHAT</button>
        <button class="btn-main" style="width:100%; margin-top:10px; background:#444;" onclick="tutupRiwayat()">BATAL</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDZU6wFZPbBX0di2sAG7ve93ArFgdZ0trw",
        authDomain: "laporan-harian-f096f.firebaseapp.com",
        databaseURL: "https://laporan-harian-f096f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "laporan-harian-f096f",
        storageBucket: "laporan-harian-f096f.firebasestorage.app",
        messagingSenderId: "1063740425135",
        appId: "1:1063740425135:web:2d7a4befce6521d72d255a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const daftarBarang = ["CUP KECIL", "CUP BESAR", "CUP HOT", "BOTOL 1 LITER", "BOTOL 500 ML", "GULA AREN", "GULA PUTIH", "KOPI", "SUSU UHT", "KRIMER", "SEA SALT", "FN", "SKM", "HERSHEY'S", "REMON", "SEDOTAN KEC", "SEDOTAN BSR", "PLASTIK ISI 2", "PLASTIK ISI 1", "PLASTIK BSR", "CUP SEALER", "BASE SUSU", "BASE KOPI", "ROTI"];
    const daftarOmset = ["CASH", "TRANSFER", "GRAB FOOD", "OVO", "SHOPEE FOOD", "SHOPEE PAY", "GOJEK", "GOPAY", "AIRASIA"];
    const daftarManual = ["CUP KECIL", "CUP BESAR", "CUP HOT", "SUSU UHT", "KRIMER", "FN", "SKM", "BASE SUSU", "BASE KOPI", "ROTI"];

    function autoSave() {
        const draft = {};
        document.querySelectorAll('input').forEach(el => { if (el.id) draft[el.id] = el.value; });
        localStorage.setItem('draft_laporan', JSON.stringify(draft));
        hitungTotal();
    }

    function loadDraft() {
        const savedDraft = localStorage.getItem('draft_laporan');
        if (savedDraft) {
            const data = JSON.parse(savedDraft);
            Object.keys(data).forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = data[id];
            });
            hitungTotal();
        }
    }

    function simpanKunciCabang() {
        localStorage.setItem('kunci_cabang', document.getElementById('main-cabang').value);
        localStorage.setItem('kunci_shift', document.getElementById('main-shift').value);
        tarikDataOtomatis();
    }

    function inisialisasi() {
        const savedCab = localStorage.getItem('kunci_cabang');
        const savedShf = localStorage.getItem('kunci_shift');
        if(savedCab) document.getElementById('main-cabang').value = savedCab;
        if(savedShf) document.getElementById('main-shift').value = savedShf;

        const tbody = document.getElementById('inventory-body');
        daftarBarang.forEach(item => {
            const id = item.replace(/[^A-Z0-9]/ig, "_");
            tbody.innerHTML += `<tr><td class="col-nama">${item}</td>
                <td><input type="text" id="stok_${id}" oninput="autoSave()"></td>
                <td><input type="text" id="msk_${id}" oninput="autoSave()"></td>
                <td><input type="text" id="rsk_${id}" oninput="autoSave()"></td>
                <td><input type="text" id="trjl_${id}" oninput="autoSave()"></td>
                <td><input type="text" id="sisa_${id}" oninput="autoSave()"></td></tr>`;
        });
        
        const oDiv = document.getElementById('omset-inputs');
        daftarOmset.forEach(m => { 
            oDiv.innerHTML += `<div class="omset-row"><span>${m}</span><input type="text" class="omset-val" id="o_${m.replace(/[^A-Z0-9]/ig,'_')}" oninput="autoSave()"></div>`; 
        });

        const tglHariIni = new Date().toISOString().split('T')[0];
        document.getElementById('label-tgl').innerText = tglHariIni;
        document.getElementById('label-hari').innerText = (["MINGGU", "SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU"])[new Date().getDay()];
        
        tarikDataOtomatis();
        loadDraft();
    }

    function tarikDataOtomatis() {
        const tglHariIni = document.getElementById('label-tgl').innerText;
        const cab = document.getElementById('main-cabang').value;
        const shf = document.getElementById('main-shift').value;
        const d = new Date(tglHariIni);
        d.setDate(d.getDate() - 1);
        const tglKemarin = d.toISOString().split('T')[0];

        db.ref('Laporan/' + tglKemarin + '/' + cab + '/' + shf).once('value', (s) => {
            const dk = s.val();
            const savedDraft = localStorage.getItem('draft_laporan'); 
            
            daftarBarang.forEach(item => {
                const id = item.replace(/[^A-Z0-9]/ig, "_");
                const iStok = document.getElementById(`stok_${id}`);
                const iSisa = document.getElementById(`sisa_${id}`);
                
                if (!savedDraft) { // Tarik hanya jika draft kosong
                    if (dk && dk[`sisa_${id}`]) {
                        iStok.value = dk[`sisa_${id}`];
                        if (!daftarManual.includes(item)) iSisa.value = dk[`sisa_${id}`];
                    }
                }
            });
        });
    }

    function simpanDanTampilkanLaporan() {
        const tgl = document.getElementById('label-tgl').innerText;
        const cab = document.getElementById('main-cabang').value;
        const shf = document.getElementById('main-shift').value;
        const data = {};
        document.querySelectorAll('input').forEach(el => { if(el.id) data[el.id] = el.value; });
        data.total = document.getElementById('display-total').innerText;

        db.ref('Laporan/' + tgl + '/' + cab + '/' + shf).set(data).then(() => {
            localStorage.removeItem('draft_laporan'); // Draft aman, hapus memori
            alert("Berhasil Simpan!");
            renderLaporanPutih(data, tgl, cab, shf);
            document.getElementById('report-overlay').style.display = 'block';
        });
    }

    function renderLaporanPutih(d, tgl, cab, shf) {
        document.getElementById('view-hari').innerText = (["MINGGU", "SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU"])[new Date(tgl).getDay()];
        document.getElementById('view-tgl').innerText = tgl;
        document.getElementById('view-cabang').innerText = cab.toUpperCase();
        document.getElementById('view-shift').innerText = shf;
        document.getElementById('view-total').innerText = d.total || "0";
        document.getElementById('view-cash').innerText = "CASH: " + (d['cash-gabungan'] || "-");
        document.getElementById('view-note').innerText = "NOTE: " + (d.note || "-");
        document.getElementById('view-r-cok').innerText = d['roti-coklat'] || "-";
        document.getElementById('view-r-van').innerText = d['roti-vanilla'] || "-";
        document.getElementById('view-r-blu').innerText = d['roti-blueberry'] || "-";
        let tableHtml = "";
        daftarBarang.forEach(item => {
            const id = item.replace(/[^A-Z0-9]/ig, "_");
            tableHtml += `<tr><td style="border:1px solid #000; text-align:left; font-weight:bold;">${item}</td><td style="border:1px solid #000; text-align:center;">${d['stok_'+id]||''}</td><td style="border:1px solid #000; text-align:center;">${d['msk_'+id]||''}</td><td style="border:1px solid #000; text-align:center;">${d['rsk_'+id]||''}</td><td style="border:1px solid #000; text-align:center;">${d['trjl_'+id]||''}</td><td style="border:1px solid #000; text-align:center;">${d['sisa_'+id]||''}</td></tr>`;
        });
        document.getElementById('view-body').innerHTML = tableHtml;
        let omsetHtml = "";
        daftarOmset.forEach(m => {
            const id = 'o_' + m.replace(/[^A-Z0-9]/ig,'_');
            omsetHtml += `<div style="display:flex; justify-content:space-between;"><span>${m}</span><span>${d[id]||'0'}</span></div>`;
        });
        document.getElementById('view-omset').innerHTML = omsetHtml;
    }

    function resetSemuaRiwayat() {
        const pin = prompt("Masukkan PIN Reset (Hapus Riwayat > 2 Hari):");
        if (pin === "9812") {
            const tglHariIni = new Date().toISOString().split('T')[0];
            const kemarin = new Date(); kemarin.setDate(kemarin.getDate() - 1);
            const tglKemarin = kemarin.toISOString().split('T')[0];
            db.ref('Laporan').once('value', (snapshot) => {
                const allData = snapshot.val();
                if (!allData) return;
                Object.keys(allData).forEach(tanggal => {
                    if (tanggal !== tglHariIni && tanggal !== tglKemarin) db.ref('Laporan/' + tanggal).remove();
                });
                alert("Riwayat lama dibersihkan. Data Kemarin & Hari ini AMAN.");
            });
        }
    }

    function downloadLaporanGambar() {
        html2canvas(document.getElementById('printable-area'), { scale: 3 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Report_${document.getElementById('view-cabang').innerText}_${document.getElementById('view-tgl').innerText}.png`;
            link.href = canvas.toDataURL("image/png"); link.click();
        });
    }

    function ambilDataRiwayat() {
        const tgl = document.getElementById('hist-date').value;
        const cab = document.getElementById('hist-cabang').value;
        const shf = document.getElementById('hist-shift').val
