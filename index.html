<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kopi Setengah-4 | Filter Sisa Manual</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap');
        html, body { background-color: #111; color: #fff; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        .wrapper { width: 100%; overflow-x: auto; padding-bottom: 50px; }
        #area-laporan { background: #000; padding: 15px; width: 520px; margin: 10px auto; box-sizing: border-box; border: 1px solid #333; }
        .main-title { text-align: center; color: #d4a373; font-size: 18px; font-weight: 800; margin-bottom: 15px; }
        .top-section { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .info-group { font-size: 11px; font-weight: 800; color: #d4a373; }
        .info-val { color: #fff; border-bottom: 1px solid #333; min-width: 80px; display: inline-block; padding-left: 5px; outline: none; }
        .roti-box { width: 150px; border: 1px solid #444; }
        .roti-header { background: #111; color: #d4a373; text-align: center; font-weight: 800; padding: 4px; font-size: 10px; }
        .roti-row { display: flex; justify-content: space-between; padding: 4px 8px; border-bottom: 1px solid #222; font-size: 10px; font-weight: 800; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 10px; }
        th { color: #d4a373; background: #111; padding: 6px 2px; border: 1px solid #444; font-size: 9px; }
        td { border: 1px solid #222; padding: 6px 2px; font-weight: 800; text-align: center; outline: none; color: #fff; }
        .col-nama { width: 160px; text-align: left !important; color: #d4a373; padding-left: 8px; background-color: #000; }
        /* Warna pembeda untuk kolom manual */
        .manual-input { background-color: #1a1a1a; color: #ffeb3b !important; }
        .omset-container { display: flex; border: 1px solid #333; margin-top: 15px; }
        .omset-row { display: flex; border-bottom: 1px solid #222; height: 25px; align-items: center; }
        .omset-label { width: 120px; padding-left: 10px; font-size: 9px; color: #d4a373; }
        .omset-input { flex: 1; text-align: left; outline: none; padding-left: 10px; font-size: 11px; color: #fff; }
        .total-box { width: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 1px solid #333; background: #111; }
        .controls { text-align: center; padding: 20px; background: #111; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .btn-wa { background: #25D366; color: #fff; padding: 15px 30px; font-weight: 800; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto; gap: 10px; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        #preview-img { max-width: 85%; border: 3px solid #fff; margin-bottom: 10px; }
    </style>
</head>
<body onload="muatSemuaData()">

<div class="controls">
    <button onclick="prosesKeGambar()" class="btn-wa">BAGIKAN KE WHATSAPP (GAMBAR)</button>
</div>

<div id="overlay">
    <img id="preview-img" src="">
    <button onclick="document.getElementById('overlay').style.display='none'" style="color:#fff; background:red; border:none; padding:10px 20px; border-radius:5px;">TUTUP</button>
</div>

<div class="wrapper">
    <div id="area-laporan">
        <div class="main-title">KOPI SETENGAH-4</div>
        <div class="top-section">
            <div class="info-group">
                <div>HARI : <span id="lbl-hari" class="info-val">MINGGU</span></div>
                <div>TGL : <span id="lbl-tgl" class="info-val">29/03/2026</span></div>
                <div>CABANG : <span class="info-val" contenteditable="true" id="save-cabang">PONDOK INDAH</span></div>
            </div>
            <div class="roti-box">
                <div class="roti-header">SISA ROTI (FISIK)</div>
                <div class="roti-row"><span>COKLAT</span><span contenteditable="true" id="roti-coklat" class="auto-save">0</span></div>
                <div class="roti-row"><span>VANILLA</span><span contenteditable="true" id="roti-vanilla" class="auto-save">0</span></div>
                <div class="roti-row"><span>BLUEBERRY</span><span contenteditable="true" id="roti-blueberry" class="auto-save">0</span></div>
            </div>
        </div>

        <table>
            <thead><tr><th style="width:160px">NAMA BARANG</th><th>STOK</th><th>MSK</th><th>RSK</th><th>TRJL</th><th>SISA</th></tr></thead>
            <tbody id="inventory-body"></tbody>
        </table>

        <div class="omset-container">
            <div style="flex:1" id="omset-list"></div>
            <div class="total-box">
                <div style="font-size: 10px; margin-bottom: 5px;">TOTAL OMSET</div>
                <div id="total-val" style="font-size: 24px; font-weight: 800;">0</div>
            </div>
        </div>
    </div>
</div>

<script>
    // DAFTAR BARANG YANG WAJIB ISI MANUAL (TIDAK OTOMATIS)
    const daftarManual = ["CUP KECIL", "CUP BESAR", "CUP HOT", "SUSU UHT", "KRIMER", "SKM", "BASE SUSU", "BASE KOPI", "ROTI"];
    
    const dataAwal28 = {"CUP KECIL": "1.156", "CUP BESAR": "133", "CUP HOT": "127", "BOTOL 1 LITER": "22", "BOTOL 500 ML": "49", "GULA AREN": "4½", "GULA PUTIH": "1½", "KOPI": "15", "SUSU UHT": "23/961", "KRIMER": "10/660", "SEA SALT CREAM": "1/870", "FN": "4/290", "SKM": "6/77", "HERSHEY'S": "1/620", "REMON": "27", "SEDOTAN KECIL": "5½", "SEDOTAN BESAR": "2½", "PLASTIK ISI 2": "5", "PLASTIK ISI 1": "7", "PLASTIK BESAR": "7", "CUP SEALER": "1", "BASE SUSU": "2.100", "BASE KOPI": "1.100", "ROTI": "48"};

    function muatSemuaData() {
        const tbody = document.getElementById('inventory-body');
        Object.keys(dataAwal28).forEach((nama, i) => {
            const isManual = daftarManual.includes(nama);
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="col-nama">${nama}</td>
                <td contenteditable="true" class="cell-save input-val" data-id="stok-${i}" data-row="${i}">${dataAwal28[nama]}</td>
                <td contenteditable="true" class="cell-save input-val" data-id="msk-${i}" data-row="${i}">0</td>
                <td contenteditable="true" class="cell-save input-val" data-id="rsk-${i}" data-row="${i}">0</td>
                <td contenteditable="true" class="cell-save input-val" data-id="trjl-${i}" data-row="${i}">0</td>
                <td contenteditable="true" class="cell-save sisa-cell ${isManual ? 'manual-input' : 'auto-calc'}" data-id="sisa-${i}" data-row="${i}">0</td>`;
            tbody.appendChild(tr);
        });

        // Render Omset
        const omsets = ["CASH (TUNAI)", "TRANSFER", "GRAB FOOD", "QRIS / OVO", "SHOPEE FOOD", "GOJEK", "GOPAY"];
        const oList = document.getElementById('omset-list');
        omsets.forEach((o, i) => { 
            oList.innerHTML += `<div class="omset-row"><div class="omset-label">${o}</div><div class="omset-input cell-save" contenteditable="true" data-id="omset-${i}">0</div></div>`; 
        });

        // Load Saved Data
        document.querySelectorAll('[data-id]').forEach(el => {
            const saved = localStorage.getItem(el.getAttribute('data-id'));
            if (saved !== null) el.innerText = saved;
            el.addEventListener('input', () => {
                localStorage.setItem(el.getAttribute('data-id'), el.innerText);
                if (el.classList.contains('input-val')) hitungSisa(el.getAttribute('data-row'));
                hitungTotal();
            });
        });

        hitungTotal();
    }

    function formatSetengah(num) {
        let str = num.toString();
        return str.endsWith('.5') ? Math.floor(num) + '½' : str;
    }

    function parseVal(str) {
        return parseFloat(str.replace('½', '.5')) || 0;
    }

    function hitungSisa(rowIdx) {
        const sisaCell = document.querySelector(`[data-id="sisa-${rowIdx}"]`);
        // JIKA BARANG MASUK DAFTAR MANUAL, JANGAN HITUNG OTOMATIS
        if (sisaCell.classList.contains('manual-input')) return;

        const stokStr = document.querySelector(`[data-id="stok-${rowIdx}"]`).innerText;
        const msk = parseVal(document.querySelector(`[data-id="msk-${rowIdx}"]`).innerText);
        const rsk = parseVal(document.querySelector(`[data-id="rsk-${rowIdx}"]`).innerText);
        const trjl = parseVal(document.querySelector(`[data-id="trjl-${rowIdx}"]`).innerText);

        let sisaHasil = "";
        if (stokStr.includes('/')) {
            let parts = stokStr.split('/');
            let utama = parseVal(parts[0]) + msk - rsk - trjl;
            sisaHasil = formatSetengah(utama) + '/' + parts[1];
        } else {
            sisaHasil = formatSetengah(parseVal(stokStr) + msk - rsk - trjl);
        }

        sisaCell.innerText = sisaHasil;
        localStorage.setItem(sisaCell.getAttribute('data-id'), sisaHasil);
    }

    function hitungTotal() {
        let t = 0; 
        document.querySelectorAll('.omset-input').forEach(i => t += parseInt(i.innerText.replace(/\./g, '')) || 0);
        document.getElementById('total-val').innerText = t.toLocaleString('id-ID');
    }

    function prosesKeGambar() {
        html2canvas(document.getElementById('area-laporan')).then(canvas => {
            document.getElementById('preview-img').src = canvas.toDataURL();
            document.getElementById('overlay').style.display = 'flex';
        });
    }
</script>
</body>
</html>
