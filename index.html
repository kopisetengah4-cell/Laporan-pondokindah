<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | Kopi Setengah-4</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { background-color: #000; color: #d4af37; font-family: sans-serif; margin: 0; padding: 2px; display: flex; flex-direction: column; align-items: center; }
        .top-nav { width: 100%; max-width: 600px; display: flex; justify-content: space-between; margin-bottom: 5px; gap: 3px; }
        .btn-main { padding: 12px 6px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px; flex: 1; color: white; text-transform: uppercase; }
        .btn-wa { background-color: #25D366; }
        .btn-menu { background-color: #d4af37; color: #000; }
        .btn-reset { background-color: #e74c3c; }

        .container { width: 100%; max-width: 600px; padding-bottom: 20px; }
        
        table.main-table { width: 100%; border-collapse: collapse; font-size: 10px; table-layout: fixed; background: #000; }
        table.main-table th { background-color: #1a1a1a; border: 1px solid #333; padding: 6px 0; color: #888; font-size: 8px; }
        .col-nama { width: 35%; text-align: left !important; padding-left: 5px !important; color: #d4af37; font-weight: bold; }
        .col-data { width: 13%; }
        table.main-table td { border: 1px solid #333; height: 25px; text-align: center; padding: 0; }
        table.main-table input { background: transparent; border: none; color: white; width: 100%; height: 100%; text-align: center; outline: none; font-size: 12px; }

        .omset-grid { display: grid; grid-template-columns: 1.5fr 1fr; border: 1px solid #333; margin-top: 5px; background: #050505; }
        .omset-row { display: flex; justify-content: space-between; padding: 4px 8px; border-bottom: 1px solid #111; font-size: 10px; align-items: center; color: #fff; }
        .omset-row input { background: transparent; border: none; color: white; width: 80px; text-align: right; outline: none; }
        .omset-total-box { font-size: 28px; font-weight: bold; color: #fff; display: flex; align-items: center; justify-content: center; background: #000; border-left: 1px solid #333; }

        .bottom-section { display: flex; gap: 5px; margin-top: 5px; width: 100%; }
        .footer-box { border: 1px solid #333; padding: 5px; text-align: center; background-color: #050505; flex: 1; }
        .footer-box label { font-size: 8px; color: #888; border-bottom: 1px solid #222; margin-bottom: 2px; display: block; }
        .footer-box input { background: transparent; border: none; color: #fff; width: 100%; text-align: center; font-size: 11px; outline: none; }

        #report-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:4000; padding: 10px; overflow-y: auto; }
        .white-report-container { background: #000; width: 360px; margin: 0 auto; padding: 10px; border: 1px solid #333; }
        
        #riwayat-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:3000; padding: 20px; }
        .modal-content { max-width: 400px; margin: 40px auto; background: #111; padding: 15px; border: 1px solid #d4af37; border-radius: 8px; color: #fff; }
        .modal-content select, .modal-content input { width: 100%; padding: 10px; margin-bottom: 10px; background: #222; color: #fff; border: 1px solid #333; }
    </style>
</head>
<body onload="mulaiSistem()">

<div class="top-nav">
    <button class="btn-main btn-wa" onclick="simpanLaporan()">SIMPAN DATA</button>
    <button class="btn-main btn-menu" onclick="bukaRiwayat()">RIWAYAT</button>
    <button class="btn-main btn-reset" onclick="resetDraft()">RESET</button>
</div>

<div class="container">
    <div style="text-align: center; font-size: 14px; font-weight: bold; margin: 10px 0;">KOPI SETENGAH-4</div>
    
    <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:8px;">
        <div style="flex: 1;">
            <span id="label-hari" style="font-weight:bold; display:block; font-size: 12px;">HARI INI</span>
            TGL: <span id="label-tgl">-</span><br>
            CAB: <select id="main-cabang" onchange="restartSistem()" style="background:#000; color:#fff; border:none; font-weight:bold;">
                <option value="Tandur">Tandur</option>
                <option value="Kebon Jeruk">Kebon Jeruk</option>
                <option value="Pondok Indah">Pondok Indah</option>
                <option value="Otista">Otista</option>
                <option value="Cemput">Cemput</option>
                <option value="Menteng">Menteng</option>
            </select><br>
            SHIFT: <select id="main-shift" onchange="restartSistem()" style="background:#000; color:#fff; border:none; font-weight:bold;"></select>
        </div>
        <div style="width: 30%;">
            <table style="width:100%; border-collapse: collapse; font-size: 9px; border: 1px solid #333;">
                <tr><td colspan="2" style="text-align:center; color:#888; background:#1a1a1a;">SISA ROTI</td></tr>
                <tr><td>COK</td><td><input type="text" id="roti-coklat" style="width:100%; background:transparent; border:none; color:#fff; text-align:center;" oninput="inputData()"></td></tr>
                <tr><td>VAN</td><td><input type="text" id="roti-vanilla" style="width:100%; background:transparent; border:none; color:#fff; text-align:center;" oninput="inputData()"></td></tr>
                <tr><td>BLU</td><td><input type="text" id="roti-blueberry" style="width:100%; background:transparent; border:none; color:#fff; text-align:center;" oninput="inputData()"></td></tr>
            </table>
        </div>
    </div>

    <table class="main-table">
        <thead>
            <tr><th class="col-nama">BARANG</th><th class="col-data">STOK</th><th class="col-data">MSK</th><th class="col-data">RSK</th><th class="col-data">TRJL</th><th class="col-data">SISA</th></tr>
        </thead>
        <tbody id="inventory-body"></tbody>
    </table>

    <div class="omset-grid">
        <div id="omset-inputs"></div>
        <div class="omset-total-box" id="display-total">0</div>
    </div>

    <div class="bottom-section">
        <div class="footer-box"><label>CASH AWAL/AKHIR</label><input type="text" id="cash-gabungan" oninput="inputData()"></div>
        <div class="footer-box"><label>NOTE</label><input type="text" id="note" oninput="inputData()"></div>
    </div>
</div>

<div id="report-overlay">
    <div style="display:flex; gap:5px; margin-bottom:10px; width: 360px; margin: 0 auto;">
        <button onclick="tutupOverlay()" style="padding:10px; flex:1;">KEMBALI</button>
        <button onclick="downloadPNG()" style="padding:10px; flex:2; background:#e74c3c; color:white; border:none; font-weight:bold;">DOWNLOAD PNG</button>
    </div>
    <div class="white-report-container" id="printable-area">
        <div id="render-content"></div>
    </div>
</div>

<div id="riwayat-modal">
    <div class="modal-content">
        <h3 style="color:#d4af37; text-align:center; margin-top:0;">CARI RIWAYAT</h3>
        <select id="hist-cabang"><option value="Tandur">Tandur</option><option value="Kebon Jeruk">Kebon Jeruk</option><option value="Pondok Indah">Pondok Indah</option><option value="Otista">Otista</option><option value="Cemput">Cemput</option><option value="Menteng">Menteng</option></select>
        <select id="hist-shift"><option value="SHIFT 1">SHIFT 1</option><option value="SHIFT 2">SHIFT 2</option></select>
        <input type="date" id="hist-date">
        <button class="btn-main" style="width:100%; background:#d4af37; color:#000; margin-bottom:10px;" onclick="cariRiwayat()">CARI</button>
        <button class="btn-main" style="width:100%; background:#444;" onclick="tutupRiwayat()">BATAL</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDZU6wFZPbBX0di2sAG7ve93ArFgdZ0trw",
        authDomain: "laporan-harian-f096f.firebaseapp.com",
        databaseURL: "https://laporan-harian-f096f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "laporan-harian-f096f",
        storageBucket: "laporan-harian-f096f.firebasestorage.app",
        messagingSenderId: "1063740425135",
        appId: "1:1063740425135:web:2d7a4befce6521d72d255a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const daftarBarang = ["CUP KECIL", "CUP BESAR", "CUP HOT", "BOTOL 1 LITER", "BOTOL 500 ML", "GULA AREN", "GULA PUTIH", "KOPI", "SUSU UHT", "KRIMER", "SEA SALT", "FN", "SKM", "HERSHEY'S", "REMON", "SEDOTAN KEC", "SEDOTAN BSR", "PLASTIK ISI 2", "PLASTIK ISI 1", "PLASTIK BSR", "CUP SEALER", "BASE SUSU", "BASE KOPI", "ROTI"];
    const daftarOmset = ["CASH", "TRANSFER", "GRAB FOOD", "OVO", "SHOPEE FOOD", "SHOPEE PAY", "GOJEK", "GOPAY", "AIRASIA"];
    const cabangSatuShift = ["Pondok Indah", "Cemput", "Menteng"];

    function mulaiSistem() {
        // 1. Tentukan Tanggal & Hari
        const skrg = new Date();
        const tglStr = skrg.toISOString().split('T')[0];
        document.getElementById('label-tgl').innerText = tglStr;
        const hariList = ["MINGGU", "SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU"];
        document.getElementById('label-hari').innerText = hariList[skrg.getDay()];

        // 2. Load Cabang & Shift
        const cab = localStorage.getItem('cab') || "Tandur";
        document.getElementById('main-cabang').value = cab;
        updateShiftSelect(cab);
        const shf = localStorage.getItem('shf') || "SHIFT 1";
        document.getElementById('main-shift').value = shf;

        // 3. Render Tabel Kosong Dulu
        renderTabelInput();

        // 4. Baru Tarik Data
        muatData(tglStr, cab, shf);
    }

    function renderTabelInput() {
        const tbody = document.getElementById('inventory-body');
        tbody.innerHTML = "";
        daftarBarang.forEach(item => {
            const id = item.replace(/[^A-Z0-9]/ig, "_");
            tbody.innerHTML += `<tr><td class="col-nama">${item}</td>
                <td><input type="text" id="stok_${id}" oninput="inputData()"></td>
                <td><input type="text" id="msk_${id}" oninput="inputData()"></td>
                <td><input type="text" id="rsk_${id}" oninput="inputData()"></td>
                <td><input type="text" id="trjl_${id}" oninput="inputData()"></td>
                <td><input type="text" id="sisa_${id}" oninput="inputData()"></td></tr>`;
        });

        const oDiv = document.getElementById('omset-inputs');
        oDiv.innerHTML = "";
        daftarOmset.forEach(m => {
            oDiv.innerHTML += `<div class="omset-row"><span>${m}</span><input type="text" class="ov" id="o_${m.replace(/[^A-Z0-9]/ig,'_')}" oninput="inputData()"></div>`;
        });
    }

    function updateShiftSelect(cab) {
        const s = document.getElementById('main-shift');
        s.innerHTML = `<option value="SHIFT 1">SHIFT 1</option>`;
        if (!cabangSatuShift.includes(cab)) s.innerHTML += `<option value="SHIFT 2">SHIFT 2</option>`;
    }

    function muatData(tgl, cab, shf) {
        // Ambil Draft Lokal
        const saved = localStorage.getItem(`draft_${cab}_${shf}`);
        if(saved) {
            const d = JSON.parse(saved);
            Object.keys(d).forEach(id => { if(document.getElementById(id)) document.getElementById(id).value = d[id]; });
        }

        // Tarik Otomatis Stok dari Shift Sebelumnya
        let pathSumber;
        if(shf === "SHIFT 2") {
            pathSumber = `LiveSync/${tgl}/${cab}/SHIFT 1`;
        } else {
            const kemaren = new Date(); kemaren.setDate(kemaren.getDate()-1);
            const tglKemaren = kemaren.toISOString().split('T')[0];
            pathSumber = `LiveSync/${tglKemaren}/${cab}/${cabangSatuShift.includes(cab) ? 'SHIFT 1' : 'SHIFT 2'}`;
        }

        db.ref(pathSumber).once('value', s => {
            const data = s.val();
            if(data) {
                daftarBarang.forEach(item => {
                    const idStok = "stok_" + item.replace(/[^A-Z0-9]/ig, "_");
                    const idSisa = "sisa_" + item.replace(/[^A-Z0-9]/ig, "_");
                    const el = document.getElementById(idStok);
                    if(el && !el.value) el.value = data[idSisa] || "";
                });
            }
            hitungTotal();
        });
    }

    function inputData() {
        const cab = document.getElementById('main-cabang').value;
        const shf = document.getElementById('main-shift').value;
        const tgl = document.getElementById('label-tgl').innerText;
        const data = {};
        document.querySelectorAll('input').forEach(i => { if(i.id) data[i.id] = i.value; });
        
        localStorage.setItem(`draft_${cab}_${shf}`, JSON.stringify(data));
        db.ref('LiveSync/' + tgl + '/' + cab + '/' + shf).set(data);
        hitungTotal();
    }

    function hitungTotal() {
        let t = 0;
        document.querySelectorAll('.ov').forEach(i => { t += parseInt(i.value.replace(/[^0-9]/g,'')) || 0; });
        document.getElementById('display-total').innerText = t.toLocaleString('id-ID');
    }

    function restartSistem() {
        const cab = document.getElementById('main-cabang').value;
        const shf = document.getElementById('main-shift').value;
        localStorage.setItem('cab', cab); localStorage.setItem('shf', shf);
        location.reload();
    }

    function simpanLaporan() {
        const tgl = document.getElementById('label-tgl').innerText;
        const cab = document.getElementById('main-cabang').value;
        const shf = document.getElementById('main-shift').value;
        const data = { total: document.getElementById('display-total').innerText };
        document.querySelectorAll('input').forEach(i => { if(i.id) data[i.id] = i.value; });

        db.ref('Laporan/' + tgl + '/' + cab + '/' + shf).set(data).then(() => {
            renderPNG(data, tgl, cab, shf);
            document.getElementById('report-overlay').style.display = 'block';
        });
    }

    function renderPNG(d, tgl, cab, shf) {
        let html = `<div style="background:#000; padding:15px; border:1px solid #d4af37;">
            <div style="text-align:center; color:#d4af37; font-weight:bold; margin-bottom:10px;">KOPI SETENGAH-4</div>
            <div style="display:flex; justify-content:space-between; color:#fff; font-size:10px; margin-bottom:10px;">
                <div>TGL: ${tgl}<br>CAB: ${cab}<br>SHIFT: ${shf}</div>
                <div style="width:30%; border:1px solid #333; padding:2px;">
                    <div style="text-align:center; color:#888; font-size:8px;">SISA ROTI</div>
                    <div style="display:flex; justify-content:space-between;"><span>COK</span><span>${d['roti-coklat']||0}</span></div>
                    <div style="display:flex; justify-content:space-between;"><span>VAN</span><span>${d['roti-vanilla']||0}</span></div>
                    <div style="display:flex; justify-content:space-between;"><span>BLU</span><span>${d['roti-blueberry']||0}</span></div>
                </div>
            </div>
            <table style="width:100%; border-collapse:collapse; font-size:9px; color:#fff; border:1px solid #333;">
                <tr style="background:#1a1a1a; color:#888;"><th>BARANG</th><th>STOK</th><th>MSK</th><th>TRJL</th><th>SISA</th></tr>`;
        
        daftarBarang.forEach(item => {
            const id = item.replace(/[^A-Z0-9]/ig, "_");
            html += `<tr><td style="color:#d4af37; border:1px solid #333;">${item}</td>
                <td style="text-align:center; border:1px solid #333;">${d['stok_'+id]||0}</td>
                <td style="text-align:center; border:1px solid #333;">${d['msk_'+id]||0}</td>
                <td style="text-align:center; border:1px solid #333;">${d['trjl_'+id]||0}</td>
                <td style="text-align:center; border:1px solid #333; font-weight:bold;">${d['sisa_'+id]||0}</td></tr>`;
        });
        html += `</table><div style="margin-top:10px; color:#fff; font-size:14px; font-weight:bold; text-align:center; border-top:1px solid #333; padding-top:5px;">TOTAL OMSET: Rp ${d.total}</div></div>`;
        document.getElementById('render-content').innerHTML = html;
    }

    function downloadPNG() {
        html2canvas(document.getElementById('printable-area'), { backgroundColor: "#000", scale: 3 }).then(c => {
            const a = document.createElement('a'); a.download = 'Laporan.png'; a.href = c.toDataURL(); a.click();
        });
    }

    function bukaRiwayat() { document.getElementById('riwayat-modal').style.display = 'block'; }
    function tutupRiwayat() { document.getElementById('riwayat-modal').style.display = 'none'; }
    function tutupOverlay() { document.getElementById('report-overlay').style.display = 'none'; }
    function cariRiwayat() {
        const t = document.getElementById('hist-date').value;
        const c = document.getElementById('hist-cabang').value;
        const s = document.getElementById('hist-shift').value;
        db.ref('Laporan/' + t + '/' + c + '/' + s).once('value', snapshot => {
            if(snapshot.val()) { renderPNG(snapshot.val(), t, c, s); tutupRiwayat(); document.getElementById('report-overlay').style.display = 'block'; }
            else alert("Tidak ada data!");
        });
    }
    function resetDraft() { if(confirm("Hapus semua?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
