<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kopi Setengah-4 | PI Cloud</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo-al.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#000000">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { background-color: #000; color: #d4af37; font-family: sans-serif; margin: 0; padding: 2px; display: flex; flex-direction: column; align-items: center; padding-bottom: 40px; }
        .top-nav { width: 100%; max-width: 600px; display: flex; justify-content: space-between; margin-bottom: 5px; gap: 3px; position: sticky; top: 0; background: #000; z-index: 10; padding: 5px 0; }
        .btn-main { padding: 8px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 10px; flex: 1; color: white; text-transform: uppercase; }
        .btn-wa { background-color: #25D366; }
        .btn-menu { background-color: #d4af37; color: #000; }
        .btn-newstok { background-color: #007bff; }
        
        .container { width: 100%; max-width: 600px; }
        .logo-pi { width: 30px; height: 30px; border: 1px solid #d4af37; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 5px; font-size: 12px; font-weight: bold; }
        .header-title { text-align: center; font-size: 14px; font-weight: bold; margin-bottom: 10px; letter-spacing: 1px; }

        .info-section { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 10px; }
        .info-details select { background: #111; color: #fff; border: 1px solid #333; font-size: 10px; padding: 3px; width: 110px; border-radius: 3px; }
        
        .roti-table { border: 1px solid #444; width: 130px; border-collapse: collapse; background: #fff; }
        .roti-table th { background-color: #eee; color: #000; font-size: 9px; padding: 3px; }
        .roti-table td { border: 1px solid #ddd; height: 20px; color: #000; font-weight: bold; font-size: 10px; padding-left: 5px; }
        .roti-table input { background: transparent; border: none; color: #d4af37; width: 100%; text-align: right; font-size: 11px; font-weight: bold; outline: none; padding-right: 5px; }

        table.main-table { width: 100%; border-collapse: collapse; font-size: 10px; table-layout: fixed; }
        table.main-table th { background-color: #1a1a1a; border: 1px solid #333; padding: 5px 0; color: #888; font-size: 9px; }
        table.main-table td { border: 1px solid #333; height: 22px; text-align: center; }
        table.main-table input { background: transparent; border: none; color: white; width: 100%; text-align: center; font-size: 11px; font-weight: bold; outline: none; }
        .col-nama { width: 38%; text-align: left !important; padding-left: 6px !important; color: #d4af37; font-weight: bold; background: #050505; }

        .omset-grid { display: grid; grid-template-columns: 1.5fr 1fr; border: 1px solid #333; margin-top: 10px; background: #050505; }
        .omset-row { display: flex; justify-content: space-between; padding: 3px 8px; border-bottom: 1px solid #111; font-size: 10px; height: 22px; align-items: center; }
        .omset-row input { background: transparent; border: none; color: white; width: 80px; text-align: right; font-size: 11px; font-weight: bold; outline: none; }
        .omset-total { font-size: 24px; font-weight: bold; color: #fff; display: flex; align-items: center; justify-content: center; background: #111; border-left: 1px solid #333; }

        .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 8px; }
        .footer-box { border: 1px solid #333; padding: 5px; text-align: center; background-color: #050505; }
        .footer-box label { font-size: 8px; color: #888; display: block; font-weight: bold; }
        .footer-box input { background: transparent; border: none; color: #fff; width: 100%; text-align: center; font-size: 11px; font-weight: bold; outline: none; }
    </style>
</head>
<body>

<div class="top-nav">
    <button class="btn-main btn-wa" onclick="simpanKeFirebase()">SIMPAN CLOUD</button>
    <button class="btn-main btn-menu" onclick="window.location.reload()">REFRESH</button>
    <button class="btn-main btn-newstok" onclick="jalankanNewStok()">NEW STOK</button>
</div>

<div class="container" id="capture-area">
    <div class="logo-pi">PI</div>
    <div class="header-title">KOPI SETENGAH-4</div>

    <div class="info-section">
        <div class="info-details">
            TANGGAL: <span id="label-tgl" style="color:#fff; font-weight: bold;">-</span><br>
            CABANG: 
            <select id="main-cabang" onchange="muatDataCloud()">
                <option>Pondok Indah</option><option>Cemput</option><option>Otista</option><option>Jl.Panjang</option><option>Tandur</option><option>Menteng</option>
            </select><br>
            SHIFT: 
            <select id="main-shift" onchange="muatDataCloud()">
                <option>SHIFT 1</option><option>SHIFT 2</option>
            </select>
        </div>
        
        <table class="roti-table">
            <thead><tr><th colspan="2">SISA ROTI (FISIK)</th></tr></thead>
            <tbody>
                <tr><td>COKLAT</td><td><input type="text" id="roti-coklat" oninput="simpanKeFirebase()"></td></tr>
                <tr><td>VANILLA</td><td><input type="text" id="roti-vanilla" oninput="simpanKeFirebase()"></td></tr>
                <tr><td>BLUEBERRY</td><td><input type="text" id="roti-blueberry" oninput="simpanKeFirebase()"></td></tr>
            </tbody>
        </table>
    </div>

    <table class="main-table">
        <thead>
            <tr><th class="col-nama">NAMA BARANG</th><th>STOK</th><th>MSK</th><th>RSK</th><th>TRJL</th><th>SISA</th></tr>
        </thead>
        <tbody id="inventory-body"></tbody>
    </table>

    <div class="omset-grid">
        <div id="omset-inputs"></div>
        <div class="omset-total" id="display-total">0</div>
    </div>

    <div class="footer-grid">
        <div class="footer-box"><label>CASH AWAL</label><input type="text" id="cash-awal" oninput="simpanKeFirebase()"></div>
        <div class="footer-box"><label>CASH AKHIR</label><input type="text" id="cash-akhir" oninput="simpanKeFirebase()"></div>
    </div>
    <div class="footer-box" style="margin-top:5px; width:100%; box-sizing: border-box;"><label>BERITA ACARA</label><input type="text" id="note" oninput="simpanKeFirebase()" style="text-align: left; padding: 2px 5px;"></div>
</div>

<script>
    // --- FIREBASE CONFIG (SESUAIKAN DENGAN MILIK ANDA) ---
    const firebaseConfig = {
        apiKey: "AIzaSyDZU6wFZPbBX0di2sAG7ve93ArFgdZ0trw",
        authDomain: "laporan-harian-f096f.firebaseapp.com",
        databaseURL: "https://laporan-harian-f096f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "laporan-harian-f096f",
        storageBucket: "laporan-harian-f096f.firebasestorage.app",
        messagingSenderId: "1063740425135",
        appId: "1:1063740425135:web:2d7a4befce6521d72d255a",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const daftarBarang = ["CUP KECIL", "CUP BESAR", "CUP HOT", "BOTOL 1 LITER", "BOTOL 500 ML", "GULA AREN", "GULA PUTIH", "KOPI", "SUSU UHT", "KRIMER", "SEA SALT", "FN", "SKM", "HERSHEY'S", "REMON", "SEDOTAN KEC", "SEDOTAN BSR", "PLASTIK ISI 2", "PLASTIK ISI 1", "PLASTIK BSR", "CUP SEALER", "BASE SUSU", "BASE KOPI", "ROTI"];
    const daftarOmset = ["CASH", "TRANSFER", "GRAB FOOD", "OVO", "SHOPEE FOOD", "SHOPEE PAY", "GOJEK", "GOPAY", "AIRASIA"];
    const manualItems = ["CUP_KECIL", "CUP_BESAR", "SUSU_UHT", "KRIMER", "SKM", "BASE_SUSU", "BASE_KOPI", "ROTI"];

    function inisialisasiTabel() {
        const tbody = document.getElementById('inventory-body');
        tbody.innerHTML = "";
        daftarBarang.forEach(item => {
            const id = item.replace(/[^A-Z0-9]/ig, "_");
            tbody.innerHTML += `<tr><td class="col-nama">${item}</td>
                <td><input type="text" id="stok_${id}" oninput="simpanKeFirebase()"></td>
                <td><input type="text" id="msk_${id}" oninput="simpanKeFirebase()"></td>
                <td><input type="text" id="rsk_${id}" oninput="simpanKeFirebase()"></td>
                <td><input type="text" id="trjl_${id}" oninput="simpanKeFirebase()"></td>
                <td><input type="text" id="sisa_${id}" oninput="simpanKeFirebase()"></td></tr>`;
        });
        const oDiv = document.getElementById('omset-inputs');
        oDiv.innerHTML = "";
        daftarOmset.forEach(m => { oDiv.innerHTML += `<div class="omset-row"><span>${m}</span><input type="text" class="omset-val" id="o_${m.replace(/[^A-Z0-9]/ig,'_')}" oninput="simpanKeFirebase()"></div>`; });
    }

    function getPath() {
        const tgl = new Date().toISOString().split('T')[0];
        const cab = document.getElementById('main-cabang').value.replace(/\s/g, '_');
        const shf = document.getElementById('main-shift').value.replace(/\s/g, '_');
        return `laporan/${tgl}/${cab}/${shf}`;
    }

    function simpanKeFirebase() {
        hitungTotal();
        const data = {};
        document.querySelectorAll('input').forEach(el => { if(el.id) data[el.id] = el.value; });
        data.total = document.getElementById('display-total').innerText;
        db.ref(getPath()).set(data);
    }

    function muatDataCloud() {
        const d = new Date();
        document.getElementById('label-tgl').innerText = d.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' }).toUpperCase();
        db.ref(getPath()).once('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                Object.keys(data).forEach(key => {
                    const el = document.getElementById(key);
                    if(el) el.value = data[key];
                });
                document.getElementById('display-total').innerText = data.total || "0";
            } else {
                // Jika data hari ini kosong, reset layar tapi jangan hapus Firebase
                document.querySelectorAll('input').forEach(el => el.value = "");
                document.getElementById('display-total').innerText = "0";
            }
        });
    }

    function hitungTotal() {
        let total = 0;
        document.querySelectorAll('.omset-val').forEach(el => { 
            let val = el.value.replace(/[^0-9]/g, '');
            total += parseInt(val) || 0; 
        });
        document.getElementById('display-total').innerText = total.toLocaleString('id-ID');
    }

    function jalankanNewStok() {
        if(confirm("Jalankan New Stok? Sisa hari ini akan menjadi Stok awal hari esok.")) {
            daftarBarang.forEach(item => {
                const id = item.replace(/[^A-Z0-9]/ig, "_");
                const sisaVal = document.getElementById(`sisa_${id}`).value || "0";
                document.getElementById(`stok_${id}`).value = sisaVal;
                document.getElementById(`msk_${id}`).value = "0";
                document.getElementById(`rsk_${id}`).value = "0";
                document.getElementById(`trjl_${id}`).value = "0";
                if (manualItems.includes(id)) {
                    document.getElementById(`sisa_${id}`).value = "0";
                } else {
                    document.getElementById(`sisa_${id}`).value = sisaVal;
                }
            });
            ["roti-coklat", "roti-vanilla", "roti-blueberry", "note"].forEach(id => document.getElementById(id).value = "");
            document.querySelectorAll('.omset-val').forEach(el => el.value = "0");
            simpanKeFirebase();
            alert("Berhasil! Stok telah diperbarui di Cloud.");
        }
    }

    // REGISTER SERVICE WORKER (PWA)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(reg => {
                console.log('SW Registered!', reg);
            }).catch(err => {
                console.log('SW Registration Failed!', err);
            });
        });
    }

    window.onload = () => { inisialisasiTabel(); muatDataCloud(); };
</script>
</body>
                                                     </html>
