<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kopi Setengah-4 | Stable Download</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap');
        html, body { background-color: #111; color: #fff; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        .wrapper { width: 100%; overflow-x: auto; padding-bottom: 20px; -webkit-overflow-scrolling: touch; }
        #area-laporan { background: #000; padding: 15px; width: 520px; margin: 10px auto; box-sizing: border-box; border: 1px solid #333; }
        
        .col-nama { width: 160px; text-align: left !important; color: #d4a373; padding-left: 8px; background-color: #000; font-weight: 800; }
        .mode-print .col-nama { background: #f2f2f2 !important; color: #000 !important; }
        
        .mode-print #area-laporan { background: #fff !important; color: #000 !important; border: 2px solid #000 !important; }
        .mode-print .info-group, .mode-print .info-val, .mode-print .omset-label, .mode-print .footer-label { color: #000 !important; }
        .mode-print .info-val { border-bottom: 1px solid #000 !important; }
        .mode-print td { border: 1px solid #000 !important; color: #000 !important; }
        .mode-print th { background: #000 !important; color: #fff !important; }
        .mode-print .total-box { background: #000 !important; color: #fff !important; }

        .main-title { text-align: center; color: #d4a373; font-size: 18px; font-weight: 800; margin-bottom: 15px; }
        .top-section { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .info-group { font-size: 11px; font-weight: 800; color: #d4a373; }
        .info-val { color: #fff; border-bottom: 1px solid #333; min-width: 80px; display: inline-block; padding-left: 5px; }
        .roti-box { width: 150px; border: 1px solid #444; }
        .roti-header { background: #111; color: #d4a373; text-align: center; font-weight: 800; padding: 4px; font-size: 10px; }
        .roti-row { display: flex; justify-content: space-between; padding: 4px 8px; border-bottom: 1px solid #222; font-size: 10px; font-weight: 800; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 10px; }
        th { color: #d4a373; background: #111; padding: 6px 2px; border: 1px solid #444; font-size: 9px; }
        td { border: 1px solid #222; padding: 6px 2px; font-weight: 800; text-align: center; outline: none; color: #fff; }
        .omset-container { display: flex; border: 1px solid #333; margin-top: 15px; }
        .omset-row { display: flex; border-bottom: 1px solid #222; height: 25px; align-items: center; }
        .omset-label { width: 120px; padding-left: 10px; font-size: 9px; color: #d4a373; }
        .omset-input { flex: 1; text-align: left; outline: none; padding-left: 10px; font-size: 11px; }
        .total-box { width: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 1px solid #333; }
        .footer-section { display: flex; gap: 10px; margin-top: 15px; }
        .footer-item { flex: 1; border: 1px solid #333; padding: 10px; text-align: center; }
        .footer-label { font-size: 10px; font-weight: 800; color: #d4a373; margin-bottom: 5px; }
        .controls { text-align: center; padding: 20px; background: #111; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .btn-gen { background: #4285F4; color: #fff; padding: 15px 30px; font-weight: 800; border-radius: 10px; border: none; cursor: pointer; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        #preview-img { max-width: 100%; max-height: 70vh; border: 2px solid #fff; margin-bottom: 15px; object-fit: contain; }
    </style>
</head>
<body onload="cekDanMuatData()">

<div class="controls">
    <button onclick="prosesLaporan()" class="btn-gen">GENERATE & SIMPAN STOK</button>
</div>

<div id="overlay">
    <div style="color: #fff; margin-bottom: 10px; font-size: 12px; font-weight: 800;">PRATINJAU LAPORAN</div>
    <img id="preview-img" src="">
    <button id="download-btn" style="background:#28a745; color:#fff; border:none; padding:15px 40px; border-radius:5px; font-weight:800; margin-bottom:10px; width: 100%; max-width: 300px; cursor:pointer;">UNDUH KE GALERI</button>
    <button onclick="document.getElementById('overlay').style.display='none'" style="background:transparent; color:#aaa; border:none; padding:10px; font-weight:800; cursor:pointer; text-decoration: underline;">KEMBALI EDIT</button>
</div>

<div class="wrapper">
    <div id="area-laporan">
        <div class="main-title">KOPI SETENGAH-4</div>
        <div class="top-section">
            <div class="info-group">
                <div>HARI : <span id="lbl-hari" class="info-val">MINGGU</span></div>
                <div>TGL : <span id="lbl-tgl" class="info-val">29/03/2026</span></div>
                <div>CABANG : <span class="info-val">PONDOK INDAH</span></div>
            </div>
            <div class="roti-box">
                <div class="roti-header">SISA ROTI (FISIK)</div>
                <div class="roti-row"><span>COKLAT</span><span contenteditable="true">18</span></div>
                <div class="roti-row"><span>VANILLA</span><span contenteditable="true">16</span></div>
                <div class="roti-row"><span>BLUEBERRY</span><span contenteditable="true">14</span></div>
            </div>
        </div>

        <table>
            <thead>
                <tr><th style="width:160px">NAMA BARANG</th><th>STOK</th><th>MSK</th><th>RSK</th><th>TRJL</th><th>SISA</th></tr>
            </thead>
            <tbody id="inventory-body"></tbody>
        </table>

        <div class="omset-container">
            <div style="flex:1" id="omset-list"></div>
            <div class="total-box">
                <div style="font-size: 10px; margin-bottom: 5px;">TOTAL OMSET</div>
                <div id="total-val" style="font-size: 24px; font-weight: 800;">0</div>
            </div>
        </div>

        <div class="footer-section">
            <div class="footer-item">
                <div class="footer-label">CASH AWAL / AKHIR</div>
                <div contenteditable="true" style="font-weight: 800; font-size: 11px;">78.500</div>
            </div>
            <div class="footer-item">
                <div class="footer-label">BERITA ACARA:</div>
                <div contenteditable="true" style="font-size: 10px;">Laporan aman.</div>
            </div>
        </div>
    </div>
</div>

<script>
    const manualItems = ["CUP KECIL", "CUP BESAR", "SUSU UHT", "KRIMER", "SKM", "BASE SUSU", "BASE KOPI", "ROTI"];
    const dataAwalSat = {"CUP KECIL": "1.156", "CUP BESAR": "133", "CUP HOT": "127", "BOTOL 1 LITER": "22", "BOTOL 500 ML": "49", "GULA AREN": "4½", "GULA PUTIH": "1½", "KOPI": "15", "SUSU UHT": "23/961", "KRIMER": "10/660", "SEA SALT CREAM": "1", "FN": "4", "SKM": "6/77", "HERSHEY'S": "1", "REMON": "27", "SEDOTAN KECIL": "5½", "SEDOTAN BESAR": "2½", "PLASTIK ISI 2": "5", "PLASTIK ISI 1": "7", "PLASTIK BESAR": "7", "CUP SEALER": "1", "BASE SUSU": "2.100", "BASE KOPI": "1.100", "ROTI": "48"};

    function cekDanMuatData() {
        const tglSekarang = new Date().toLocaleDateString('id-ID');
        const tglTerakhir = localStorage.getItem('last_date_v5');
        const labelHari = ["MINGGU", "SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU"][new Date().getDay()];
        
        document.getElementById('lbl-hari').innerText = labelHari;
        document.getElementById('lbl-tgl').innerText = tglSekarang;

        let stokHariIni = dataAwalSat;
        if (tglTerakhir && tglTerakhir !== tglSekarang) {
            const savedSisa = JSON.parse(localStorage.getItem('saved_sisa_v5'));
            if (savedSisa) stokHariIni = savedSisa;
        }

        renderApp(stokHariIni);
        localStorage.setItem('last_date_v5', tglSekarang);
    }

    function renderApp(stokData) {
        const tbody = document.getElementById('inventory-body');
        tbody.innerHTML = "";
        Object.keys(stokData).forEach(nama => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="col-nama">${nama}</td><td contenteditable="true">${stokData[nama]}</td><td contenteditable="true">0</td><td contenteditable="true">0</td><td contenteditable="true">0</td><td contenteditable="true">${manualItems.includes(nama) ? "" : stokData[nama]}</td>`;
            tbody.appendChild(tr);
        });

        const omsets = ["CASH", "TRANSFER", "GRAB", "QRIS", "SHOPEE", "GOJEK", "GOPAY"];
        const oList = document.getElementById('omset-list');
        oList.innerHTML = "";
        omsets.forEach(o => { oList.innerHTML += `<div class="omset-row"><div class="omset-label">${o}</div><div class="omset-input" contenteditable="true">0</div></div>`; });

        document.querySelectorAll('.omset-input').forEach(el => {
            el.addEventListener('input', () => {
                let t = 0; document.querySelectorAll('.omset-input').forEach(i => t += parseInt(i.innerText.replace(/\./g, '')) || 0);
                document.getElementById('total-val').innerText = t.toLocaleString('id-ID');
            });
        });
    }

    function prosesLaporan() {
        // SIMPAN DATA
        const sisaSekarang = {};
        document.querySelectorAll('#inventory-body tr').forEach(tr => { sisaSekarang[tr.cells[0].innerText] = tr.cells[5].innerText; });
        localStorage.setItem('saved_sisa_v5', JSON.stringify(sisaSekarang));

        document.body.classList.add('mode-print');
        html2canvas(document.getElementById('area-laporan'), { scale: 2, logging: false, useCORS: true }).then(canvas => {
            const imgData = canvas.toDataURL("image/png");
            document.getElementById('preview-img').src = imgData;
            document.getElementById('overlay').style.display = 'flex';
            document.body.classList.remove('mode-print');

            // PERBAIKAN DOWNLOAD: Menggunakan Trigger Aman
            document.getElementById('download-btn').onclick = function() {
                const link = document.createElement('a');
                link.setAttribute('href', imgData);
                link.setAttribute('download', `Laporan_${new Date().toLocaleDateString('id-ID').replace(/\//g, '-')}.png`);
                document.body.appendChild(link); // Penting untuk Firefox/Mobile
                link.click();
                document.body.removeChild(link);
            };
        });
    }
</script>
</body>
</html>
