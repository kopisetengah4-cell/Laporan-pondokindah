<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kopi Setengah-4 Fix v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #000; color: #fff; margin: 0; padding: 10px; overflow-x: hidden; }
        #area-laporan { background: #000; padding: 15px; min-width: 650px; margin: auto; }
        .main-title { text-align: center; color: #d4a373; font-size: 20px; font-weight: 800; letter-spacing: 3px; margin-bottom: 15px; }
        .header-info { display: flex; justify-content: space-between; margin-bottom: 10px; gap: 15px; width: 650px; }
        .left-info { flex: 1; font-size: 11px; color: #d4a373; }
        .info-item { display: flex; margin-bottom: 4px; }
        .info-label { width: 80px; font-weight: 600; }
        .info-val { color: #fff; flex: 1; outline: none; }
        .roti-box { width: 180px; border: 1px solid #333; }
        .roti-header { background: #111; color: #d4a373; font-size: 10px; font-weight: 800; display: flex; text-align: center; border-bottom: 1px solid #333; }
        .roti-row { display: flex; font-size: 10px; border-bottom: 1px solid #222; }
        .roti-name { width: 60%; padding: 5px; color: #fff; }
        .roti-val { width: 40%; padding: 5px; text-align: center; outline: none; border-left: 1px solid #333; color: #fff; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 650px; }
        th { color: #d4a373; background: #111; font-weight: 800; padding: 8px 4px; border: 1px solid #333; font-size: 9px; }
        td { border: 1px solid #222; padding: 4px; text-align: center; color: #fff; font-weight: 600; height: 32px; } 
        .name-col { text-align: left; padding-left: 10px; width: 180px; }
        .stok-col { color: #fff !important; font-weight: 800; }
        .omset-section { width: 650px; margin-top: 15px; }
        .omset-container { display: flex; border: 1px solid #333; }
        .omset-right { width: 180px; display: flex; align-items: center; justify-content: center; border-left: 1px solid #333; background: #080808; }
        .total-big { font-size: 32px; font-weight: 800; color: #d4a373; }
        .omset-row { display: flex; border-bottom: 1px solid #222; width: 100%; }
        .omset-label { width: 60%; padding: 6px 10px; font-size: 10px; color: #aaa; text-align: left; }
        .omset-input { flex: 1; padding: 6px; color: #fff; text-align: center; outline: none; font-weight: 600; }
        .btn-save { background: #d4a373; color: #000; width: 100%; max-width: 650px; padding: 15px; font-weight: 800; margin: 15px auto; display: block; border-radius: 6px; }

        /* Mode Unduh (Putih) */
        .download-mode#area-laporan { background-color: #fff !important; }
        .download-mode td, .download-mode .info-val, .download-mode .roti-name, .download-mode .roti-val, .download-mode .omset-input, .download-mode #berita-acara { color: #000 !important; }
        .download-mode .main-title, .download-mode th, .download-mode .total-big { color: #000 !important; }
        .download-mode th { background-color: #f0f0f0 !important; }
        .download-mode .omset-right { background-color: #f9f9f9 !important; }
        .download-mode table, .download-mode td, .download-mode th, .download-mode .omset-container { border-color: #ccc !important; }
    </style>
</head>
<body>

<div id="area-laporan">
    <div class="main-title">KOPI SETENGAH-4</div>
    <div class="header-info">
        <div class="left-info">
            <div class="info-item"><span class="info-label">HARI</span><span id="out-hari" class="info-val">: -</span></div>
            <div class="info-item"><span class="info-label">TANGGAL</span><span id="out-tgl" class="info-val">: -</span></div>
            <div class="info-item"><span class="info-label">CABANG</span><span id="cabang" contenteditable="true" class="info-val">: P.INDAH</span></div>
            <div class="info-item"><span class="info-label">SHIFT</span><span id="shift" contenteditable="true" class="info-val">: </span></div>
        </div>
        <div class="roti-box">
            <div class="roti-header"><div style="width:60%">ROTI</div><div style="width:40%">SISA</div></div>
            <div class="roti-row"><div class="roti-name">COKLAT</div><div contenteditable="true" class="roti-val">0</div></div>
            <div class="roti-row"><div class="roti-name">VANILLA</div><div contenteditable="true" class="roti-val">0</div></div>
            <div class="roti-row"><div class="roti-name">BLUEBERRY</div><div contenteditable="true" class="roti-val">0</div></div>
        </div>
    </div>

    <div style="width: 100%; overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th class="name-col">NAMA BARANG</th>
                    <th>STOK AWAL</th>
                    <th>MASUK</th>
                    <th>RUSAK</th>
                    <th>TERJUAL</th>
                    <th>SISA STOK</th>
                </tr>
            </thead>
            <tbody id="body-stok"></tbody>
        </table>
    </div>

    <div class="omset-section">
        <div class="omset-container">
            <div id="omset-list" style="flex:1"></div>
            <div class="omset-right"><div class="total-big" id="total-display">0</div></div>
        </div>
        <div style="border: 1px solid #333; margin-top: 10px; padding: 10px;">
            <div style="font-size:10px; color:#d4a373; font-weight:800;">BERITA ACARA:</div>
            <div id="berita-acara" contenteditable="true" style="font-size:11px; min-height:30px; outline:none;">...</div>
        </div>
    </div>
</div>

<button onclick="unduhLaporan()" class="btn-save">UNDUH LAPORAN (HASIL PUTIH)</button>
<button onclick="localStorage.clear(); location.reload();" style="color:#666; font-size:10px; display:block; margin:auto;">Klik jika data tidak muncul (Reset Memori)</button>

<script>
    const daftarBarang = ["Cup Kecil", "Cup Besar", "Cup Hot", "Botol 1 Liter", "Botol 500 Ml", "Gula Aren", "Gula Putih", "Kopi", "Susu UHT", "Krimer", "Sea Salt Cream", "Fn", "SKM", "Hershey's", "Remon", "Sedotan Kecil", "Sedotan Besar", "Plastik Isi 2", "Plastik Isi 1", "Plastik Besar", "Cup Sealer", "Base Susu", "Base Kopi", "Roti"];
    const defaultAwal = {"Cup Kecil":"1.170","Cup Besar":"135","Cup Hot":"127","Botol 1 Liter":"22","Botol 500 Ml":"49","Gula Aren":"4½","Gula Putih":"1½","Kopi":"15","Susu UHT":"25/995","Krimer":"10/998","Sea Salt Cream":"1/870","Fn":"4/290","SKM":"6/114","Hershey's":"1/620","Remon":"27","Sedotan Kecil":"5½","Sedotan Besar":"2½","Plastik Isi 2":"5","Plastik Isi 1":"7","Plastik Besar":"7","Cup Sealer":"1","Base Susu":"1.500","Base Kopi":"1.000","Roti":"49"};

    function init() {
        const now = new Date();
        document.getElementById('out-hari').innerText = ": " + now.toLocaleDateString('id-ID', {weekday:'long'}).toUpperCase();
        document.getElementById('out-tgl').innerText = ": " + now.toLocaleDateString('id-ID');

        let session = JSON.parse(localStorage.getItem('kopi4_session'));
        
        // LOGIKA BARU: Jika stok awal kosong atau semua 0, paksa ambil dari defaultAwal
        const tableBody = document.getElementById('body-stok');
        tableBody.innerHTML = '';

        daftarBarang.forEach(nama => {
            let sAwal = (session && session.stokAwal[nama]) ? session.stokAwal[nama] : defaultAwal[nama];
            
            // Pengaman: Jika sAwal masih terbaca "0" padahal di default ada nilainya, ganti ke default
            if ((sAwal === "0" || sAwal === 0) && defaultAwal[nama]) {
                sAwal = defaultAwal[nama];
            }

            const msk = session?.inputs[nama]?.msk || "0";
            const rsk = session?.inputs[nama]?.rsk || "0";
            const tjl = session?.inputs[nama]?.tjl || "0";
            const sisa = session?.inputs[nama]?.sisa || sAwal;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="name-col">${nama.toUpperCase()}</td>
                <td class="stok-col">${sAwal}</td>
                <td contenteditable="true">${msk}</td>
                <td contenteditable="true">${rsk}</td>
                <td contenteditable="true">${tjl}</td>
                <td contenteditable="true">${sisa}</td>
            `;
            tableBody.appendChild(tr);
        });

        renderOmset(session?.omset);
        attachLogic();
    }

    function renderOmset(saved) {
        const list = ["CASH (TUNAI)", "TRANSFER", "SISA", "GRAB FOOD", "OVO / QRIS", "SHOPEE FOOD", "SHOPEE PAY", "GOJEK / GOTO", "GOPAY", "AIRASIA FOOD", "CASH AWAL/AKHIR"];
        const container = document.getElementById('omset-list');
        container.innerHTML = '';
        list.forEach((l, i) => {
            container.innerHTML += `<div class="omset-row"><div class="omset-label">${l}</div><div contenteditable="true" class="omset-input">${saved?.[i] || "0"}</div></div>`;
        });
        updateTotal();
    }

    function attachLogic() {
        document.getElementById('area-laporan').addEventListener('input', () => {
            document.querySelectorAll('#body-stok tr').forEach(row => {
                const s = parseVal(row.cells[1].innerText);
                const m = parseVal(row.cells[2].innerText);
                const r = parseVal(row.cells[3].innerText);
                const t = parseVal(row.cells[4].innerText);
                row.cells[5].innerText = (s + m - r - t).toLocaleString('id-ID').replace(',', '.');
            });
            updateTotal();
            save();
        });
    }

    function parseVal(s) {
        if (!s || s === "0") return 0;
        let v = s.toString().replace(/\./g, '').replace(',', '.');
        if (v.includes('½')) return parseFloat(v) + 0.5;
        if (v.includes('/')) return parseFloat(v.split('/')[0]);
        return parseFloat(v) || 0;
    }

    function updateTotal() {
        let t = 0;
        document.querySelectorAll('.omset-input').forEach((el, i) => { if(i < 10) t += parseVal(el.innerText); });
        document.getElementById('total-display').innerText = t.toLocaleString('id-ID').replace(',', '.');
    }

    function save() {
        let data = { stokAwal: {}, inputs: {}, omset: [] };
        document.querySelectorAll('#body-stok tr').forEach(r => {
            const n = r.cells[0].innerText;
            data.stokAwal[n] = r.cells[1].innerText;
            data.inputs[n] = { msk: r.cells[2].innerText, rsk: r.cells[3].innerText, tjl: r.cells[4].innerText, sisa: r.cells[5].innerText };
        });
        document.querySelectorAll('.omset-input').forEach(i => data.omset.push(i.innerText));
        localStorage.setItem('kopi4_session', JSON.stringify(data));
    }

    function unduhLaporan() {
        const el = document.getElementById('area-laporan');
        el.classList.add('download-mode');
        setTimeout(() => {
            html2canvas(el, { scale: 2.5, backgroundColor: '#ffffff' }).then(c => {
                const a = document.createElement('a');
                a.download = `Laporan_Kopi4.png`;
                a.href = c.toDataURL();
                a.click();
                el.classList.remove('download-mode');
            });
        }, 100);
    }
    init();
</script>
</body>
</html>
