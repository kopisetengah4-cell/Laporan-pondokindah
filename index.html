<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PI Dashboard</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/d4af37/000000?text=PI">
    <link rel="manifest" href="manifest.json">

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { background-color: #000; color: #d4af37; font-family: sans-serif; margin: 0; padding: 2px; display: flex; flex-direction: column; align-items: center; padding-bottom: 20px; -webkit-tap-highlight-color: transparent; }
        .top-nav { width: 100%; max-width: 600px; display: flex; justify-content: space-between; margin-bottom: 5px; gap: 3px; }
        .btn-main { padding: 8px 6px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px; flex: 1; color: white; text-transform: uppercase; }
        .btn-wa { background-color: #25D366; }
        .btn-menu { background-color: #d4af37; color: #000; }
        .btn-new { background-color: #007bff; }

        .container { width: 100%; max-width: 600px; }
        .logo-pi { width: 30px; height: 30px; border: 1.5px solid #d4af37; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 5px auto; font-size: 12px; font-weight: bold; background: #111; }
        .header-title { text-align: center; font-size: 14px; font-weight: bold; margin-bottom: 8px; letter-spacing: 1px; }

        table.main-table { width: 100%; border-collapse: collapse; font-size: 10px; table-layout: fixed; }
        table.main-table th { background-color: #1a1a1a; border: 1px solid #333; padding: 4px 0; color: #888; font-size: 9px; }
        table.main-table td { border: 1px solid #333; height: 22px; text-align: center; padding: 0; }
        table.main-table input { background: transparent; border: none; color: white; width: 100%; height: 100%; text-align: center; outline: none; font-size: 11px; }
        .col-nama { width: 35%; text-align: left !important; padding-left: 5px !important; color: #d4af37; font-weight: bold; overflow: hidden; white-space: nowrap; }

        .omset-grid { display: grid; grid-template-columns: 1.5fr 1fr; border: 1px solid #333; margin-top: 5px; background: #050505; }
        .omset-list-container { border-right: 1px solid #333; }
        .omset-row { display: flex; justify-content: space-between; padding: 2px 8px; border-bottom: 1px solid #111; font-size: 10px; height: 18px; align-items: center; }
        .omset-row input { background: transparent; border: none; color: white; width: 70px; text-align: right; outline: none; font-size: 10px; }
        .omset-total-box { font-size: 26px; font-weight: bold; color: #fff; display: flex; align-items: center; justify-content: center; background: #000; }

        .footer-split { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; margin-top: 5px; width: 100%; }
        .footer-box { border: 1px solid #333; padding: 5px; text-align: center; background-color: #050505; }
        .footer-box label { font-size: 8px; color: #888; display: block; margin-bottom: 2px; }
        .footer-box input { background: transparent; border: none; color: #fff; width: 100%; text-align: center; font-size: 11px; outline: none; }

        #report-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; overflow-y: auto; padding: 10px 0; align-items: center; flex-direction: column; }
        .report-actions { width: 95%; max-width: 480px; display: flex; justify-content: space-between; margin-bottom: 10px; gap: 5px; }
        .report-canvas-area { background: #fff; color: #000; width: 95%; max-width: 480px; padding: 15px; border: 1px solid #000; box-sizing: border-box; }
        .white-table { width: 100%; border-collapse: collapse; font-size: 9px; border: 1px solid #000; }
        .white-table th, .white-table td { border: 1px solid #000; padding: 2px; text-align: center; }
    </style>
</head>
<body>

<div class="top-nav">
    <button class="btn-main btn-wa" onclick="bukaLaporanSekarang()">SIMPAN & LIHAT</button>
    <button class="btn-main btn-new" onclick="jalankanNewSistem()">NEW</button>
</div>

<div class="container" id="input-container">
    <div class="logo-pi">PI</div>
    <div class="header-title">KOPI SETENGAH-4</div>
    
    <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:8px;">
        <div>
            TGL: <span id="label-tgl">-</span><br>
            CAB: <select id="main-cabang" onchange="muatData()" style="background:#000; color:#fff; border:1px solid #333;"><option>Pondok Indah</option><option>Cemput</option><option>Otista</option><option>Jl.Panjang</option><option>Tandur</option><option>Menteng</option></select><br>
            SHIFT: <select id="main-shift" onchange="muatData()" style="background:#000; color:#fff; border:1px solid #333;"><option>SHIFT 1</option><option>SHIFT 2</option></select>
        </div>
        <table class="white-table" style="color:#d4af37; border-color:#333; background:#000; width:110px;">
            <tr><th colspan="2" style="background:#111; color:#888; font-size:8px;">SISA ROTI</th></tr>
            <tr><td>COK</td><td><input type="text" id="roti-coklat" oninput="simpanFirebase()"></td></tr>
            <tr><td>VAN</td><td><input type="text" id="roti-vanilla" oninput="simpanFirebase()"></td></tr>
            <tr><td>BLU</td><td><input type="text" id="roti-blueberry" oninput="simpanFirebase()"></td></tr>
        </table>
    </div>

    <table class="main-table">
        <thead><tr><th class="col-nama">BARANG</th><th>STOK</th><th>MSK</th><th>RSK</th><th>TRJL</th><th>SISA</th></tr></thead>
        <tbody id="inventory-body"></tbody>
    </table>

    <div class="omset-grid">
        <div class="omset-list-container" id="omset-inputs"></div>
        <div class="omset-total-box" id="display-total">0</div>
    </div>

    <div class="footer-split">
        <div class="footer-box"><label>CASH AWAL/AKHIR</label><input type="text" id="cash-gabungan" oninput="simpanFirebase()"></div>
        <div class="footer-box"><label>BERITA ACARA</label><input type="text" id="note" oninput="simpanFirebase()"></div>
    </div>
</div>

<div id="report-page">
    <div class="report-actions">
        <button class="btn-main btn-menu" onclick="tutupSemua()">KEMBALI</button>
        <button class="btn-main btn-wa" onclick="downloadPng()">DOWNLOAD ↓</button>
    </div>
    <div class="report-canvas-area" id="capture-area">
        <div style="text-align:center; font-weight:bold; font-size:16px; border-bottom:2px solid #000; padding-bottom:5px; margin-bottom:10px;">KOPI SETENGAH-4</div>
        <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:10px;">
            <div id="rep-info" style="line-height:1.4;"></div>
            <table class="white-table" style="width:100px;"><tbody id="rep-roti-body"></tbody></table>
        </div>
        <table class="white-table"><thead><tr><th>NAMA BARANG</th><th>STOK</th><th>MSK</th><th>RSK</th><th>TRJL</th><th>SISA</th></tr></thead><tbody id="rep-main-body"></tbody></table>
        <div style="display:grid; grid-template-columns: 1.5fr 1fr; border:1px solid #000; border-top:none;">
            <div id="rep-omset-data" style="border-right:1px solid #000;"></div>
            <div id="rep-total-val" style="font-size:28px; font-weight:bold; text-align:center; align-self:center;">0</div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; border:1px solid #000; border-top:none; font-size:9px; padding:5px;">
            <div><strong>CASH:</strong> <span id="rep-cash-val"></span></div>
            <div><strong>NOTE:</strong> <span id="rep-note"></span></div>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyDZU6wFZPbBX0di2sAG7ve93ArFgdZ0trw",
        authDomain: "laporan-harian-f096f.firebaseapp.com",
        databaseURL: "https://laporan-harian-f096f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "laporan-harian-f096f",
        storageBucket: "laporan-harian-f096f.firebasestorage.app",
        messagingSenderId: "1063740425135",
        appId: "1:1063740425135:web:2d7a4befce6521d72d255a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const daftarBarang = ["CUP KECIL", "CUP BESAR", "CUP HOT", "BOTOL 1 LITER", "BOTOL 500 ML", "GULA AREN", "GULA PUTIH", "KOPI", "SUSU UHT", "KRIMER", "SEA SALT", "FN", "SKM", "HERSHEY'S", "REMON", "SEDOTAN KEC", "SEDOTAN BSR", "PLASTIK ISI 2", "PLASTIK ISI 1", "PLASTIK BSR", "CUP SEALER", "BASE SUSU", "BASE KOPI", "ROTI"];
    const daftarOmset = ["CASH", "TRANSFER", "GRAB FOOD", "OVO", "SHOPEE FOOD", "SHOPEE PAY", "GOJEK", "GOPAY", "AIRASIA"];

    function inisialisasi() {
        const tbody = document.getElementById('inventory-body');
        daftarBarang.forEach(item => {
            const id = item.replace(/[^A-Z0-9]/ig, "_");
            tbody.innerHTML += `<tr><td class="col-nama">${item}</td><td><input type="text" id="stok_${id}" oninput="simpanFirebase()"></td><td><input type="text" id="msk_${id}" oninput="simpanFirebase()"></td><td><input type="text" id="rsk_${id}" oninput="simpanFirebase()"></td><td><input type="text" id="trjl_${id}" oninput="simpanFirebase()"></td><td><input type="text" id="sisa_${id}" oninput="simpanFirebase()"></td></tr>`;
        });
        const oDiv = document.getElementById('omset-inputs');
        daftarOmset.forEach(m => { 
            oDiv.innerHTML += `<div class="omset-row"><span>${m}</span><input type="text" class="omset-val" id="o_${m.replace(/[^A-Z0-9]/ig,'_')}" oninput="simpanFirebase()"></div>`; 
        });
        muatData();
    }

    function simpanFirebase() {
        const tgl = new Date().toISOString().split('T')[0];
        const cab = document.getElementById('main-cabang').value;
        const shf = document.getElementById('main-shift').value;
        let total = 0;
        document.querySelectorAll('.omset-val').forEach(el => { total += parseInt(el.value.replace(/[^0-9]/g, '')) || 0; });
        document.getElementById('display-total').innerText = total.toLocaleString('id-ID');
        const data = {};
        document.querySelectorAll('input').forEach(el => { if(el.id) data[el.id] = el.value; });
        data.total = total.toLocaleString('id-ID');
        db.ref('Laporan/' + tgl + '/' + cab + '/' + shf).set(data);
    }

    function muatData() {
        const tgl = new Date().toISOString().split('T')[0];
        const cab = document.getElementById('main-cabang').value;
        const shf = document.getElementById('main-shift').value;
        document.getElementById('label-tgl').innerText = tgl;
        db.ref('Laporan/' + tgl + '/' + cab + '/' + shf).once('value', (snapshot) => {
            const saved = snapshot.val();
            document.querySelectorAll('input').forEach(el => { el.value = (saved && saved[el.id]) ? saved[el.id] : ""; });
            document.getElementById('display-total').innerText = (saved && saved.total) ? saved.total : "0";
        });
    }

    function getHari(tgl) { const d = new Date(tgl); const h = ["MINGGU", "SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU"]; return h[d.getDay()]; }
    function tutupSemua() { document.getElementById('report-page').style.display='none'; }
    function downloadPng() { html2canvas(document.getElementById('capture-area'), { scale: 3 }).then(canvas => { const a = document.createElement('a'); a.download = `Lap_${new Date().getTime()}.png`; a.href = canvas.toDataURL(); a.click(); }); }
    
    function renderLaporan(data, t, c, s) {
        if(!data) return alert("Belum ada data untuk shift ini.");
        const hariText = getHari(t);
        document.getElementById('rep-info').innerHTML = `HARI: ${hariText}<br>TGL: ${t}<br>CABANG: ${c.toUpperCase()}<br>SHIFT: ${s}`;
        document.getElementById('rep-roti-body').innerHTML = `<tr><th colspan="2">ROTI</th></tr><tr><td>COK</td><td>${data['roti-coklat']||0}</td></tr><tr><td>VAN</td><td>${data['roti-vanilla']||0}</td></tr><tr><td>BLU</td><td>${data['roti-blueberry']||0}</td></tr>`;
        const mainB = document.getElementById('rep-main-body'); mainB.innerHTML = "";
        daftarBarang.forEach(item => {
            const id = item.replace(/[^A-Z0-9]/ig, "_");
            mainB.innerHTML += `<tr><td>${item}</td><td>${data['stok_'+id]||0}</td><td>${data['msk_'+id]||0}</td><td>${data['rsk_'+id]||0}</td><td>${data['trjl_'+id]||0}</td><td>${data['sisa_'+id]||0}</td></tr>`;
        });
        const oB = document.getElementById('rep-omset-data'); oB.innerHTML = "";
        daftarOmset.forEach(m => { oB.innerHTML += `<div style="display:flex; justify-content:space-between; font-size:10px; padding:2px 8px; border-bottom:1px solid #eee;"><span>${m}</span><span>${data['o_'+m.replace(/[^A-Z0-9]/ig,'_')]||0}</span></div>`; });
        document.getElementById('rep-total-val').innerText = data.total;
        document.getElementById('rep-cash-val').innerText = data['cash-gabungan'] || "-";
        document.getElementById('rep-note').innerText = data['note'] || "-";
        document.getElementById('report-page').style.display = 'flex';
    }

    function bukaLaporanSekarang() {
        const t = new Date().toISOString().split('T')[0];
        const c = document.getElementById('main-cabang').value;
        const s = document.getElementById('main-shift').value;
        db.ref('Laporan/' + t + '/' + c + '/' + s).once('value', (snap) => { renderLaporan(snap.val(), t, c, s); });
    }

    function jalankanNewSistem() {
        if(confirm("Pindahkan 'SISA' ke 'STOK' esok hari?")) {
            // Logika pindah data bisa ditambahkan di sini jika diperlukan
            alert("Sistem Reset Berhasil.");
        }
    }

    window.onload = inisialisasi;

    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    }
</script>
</body>
</html>
