<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PI Dashboard | Kopi Setengah-4</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { background-color: #000; color: #d4af37; font-family: sans-serif; margin: 0; padding: 2px; display: flex; flex-direction: column; align-items: center; }
        .top-nav { width: 100%; max-width: 600px; display: flex; justify-content: space-between; margin-bottom: 5px; gap: 3px; }
        .btn-main { padding: 12px 6px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px; flex: 1; color: white; text-transform: uppercase; }
        .btn-wa { background-color: #25D366; }
        .btn-menu { background-color: #d4af37; color: #000; }
        .btn-reset { background-color: #e74c3c; }
        .container { width: 100%; max-width: 600px; padding-bottom: 20px; }
        
        table.main-table { width: 100%; border-collapse: collapse; font-size: 10px; table-layout: fixed; background: #000; }
        table.main-table th { background-color: #1a1a1a; border: 1px solid #333; padding: 6px 0; color: #888; font-size: 8px; }
        .col-nama { width: 35%; text-align: left !important; padding-left: 5px !important; color: #d4af37; font-weight: bold; }
        .col-data { width: 13%; }
        table.main-table td { border: 1px solid #333; height: 28px; text-align: center; padding: 0; }
        table.main-table input { background: transparent; border: none; color: white; width: 100%; height: 100%; text-align: center; outline: none; font-size: 13px; }

        .roti-box { width: 32%; } 
        table.roti-table { width: 100%; border-collapse: collapse; font-size: 9px; border: 1px solid #333; table-layout: fixed; }
        .r-name { width: 65%; text-align: left !important; padding-left: 5px !important; color: #fff; border: 1px solid #333; }
        .r-inp { width: 35%; border: 1px solid #333; }
        table.roti-table input { background: transparent; border: none; color: white; width: 100%; text-align: center; outline: none; font-size: 11px; height: 20px; }

        .omset-grid { display: grid; grid-template-columns: 1.5fr 1fr; border: 1px solid #333; margin-top: 5px; background: #050505; }
        .omset-row { display: flex; justify-content: space-between; padding: 5px 8px; border-bottom: 1px solid #111; font-size: 10px; align-items: center; color: #fff; }
        .omset-row input { background: transparent; border: none; color: white; width: 90px; text-align: right; outline: none; font-size: 12px; }
        .omset-total-box { font-size: 28px; font-weight: bold; color: #fff; display: flex; align-items: center; justify-content: center; background: #000; border-left: 1px solid #333; }

        .bottom-section { display: flex; gap: 5px; margin-top: 5px; width: 100%; }
        .footer-box { border: 1px solid #333; padding: 5px; text-align: center; background-color: #050505; flex: 1; }
        .footer-box label { font-size: 8px; color: #888; border-bottom: 1px solid #222; margin-bottom: 2px; display: block; }
        .footer-box input { background: transparent; border: none; color: #fff; width: 100%; text-align: center; font-size: 11px; outline: none; }

        #report-overlay, #riwayat-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:4000; padding: 10px; overflow-y: auto; }
        .modal-inner { background: #000; width: 320px; margin: 40px auto; padding: 20px; border: 2px solid #d4af37; color: #fff; border-radius: 8px; }
    </style>
</head>
<body onload="initApp()">

<div class="top-nav">
    <button class="btn-main btn-wa" onclick="prosesSimpan()">SIMPAN DATA</button>
    <button class="btn-main btn-menu" onclick="bukaRiwayat()">RIWAYAT</button>
    <button class="btn-main btn-reset" onclick="resetApp()">RESET</button>
</div>

<div class="container">
    <div style="text-align: center; font-size: 14px; font-weight: bold; margin: 10px 0; color: #d4af37;">KOPI SETENGAH-4</div>
    
    <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:8px; align-items: flex-end;">
        <div style="flex: 1;">
            <span id="label-hari" style="font-weight:bold; display:block; font-size: 12px; text-transform: uppercase;">-</span>
            TGL: <span id="label-tgl">-</span><br>
            CAB: <select id="main-cab" onchange="gantiLokasi()" style="background:#000; color:#fff; border:none; font-weight:bold;">
                <option value="Tandur">Tandur</option>
                <option value="Kebon Jeruk">Kebon Jeruk</option>
                <option value="Pondok Indah">Pondok Indah</option>
                <option value="Otista">Otista</option>
                <option value="Cemput">Cemput</option>
                <option value="Menteng">Menteng</option>
            </select><br>
            SHIFT: <select id="main-shf" onchange="gantiShift()" style="background:#000; color:#fff; border:none; font-weight:bold;">
                <option value="SHIFT 1">SHIFT 1</option>
                <option value="SHIFT 2">SHIFT 2</option>
            </select>
        </div>
        <div class="roti-box">
            <table class="roti-table">
                <tr style="background:#1a1a1a; color:#888;"><td colspan="2" style="text-align:center; font-size: 8px; border: 1px solid #333;">SISA ROTI</td></tr>
                <tr><td class="r-name">COKLAT</td><td class="r-inp"><input type="text" id="r_cok" oninput="hitung()"></td></tr>
                <tr><td class="r-name">VANILLA</td><td class="r-inp"><input type="text" id="r_van" oninput="hitung()"></td></tr>
                <tr><td class="r-name">BLUEBERRY</td><td class="r-inp"><input type="text" id="r_blu" oninput="hitung()"></td></tr>
            </table>
        </div>
    </div>

    <table class="main-table">
        <thead>
            <tr><th class="col-nama">BARANG</th><th class="col-data">STOK</th><th class="col-data">MSK</th><th class="col-data">RSK</th><th class="col-data">TRJL</th><th class="col-data">SISA</th></tr>
        </thead>
        <tbody id="list-barang"></tbody>
    </table>

    <div class="omset-grid">
        <div id="list-omset"></div>
        <div class="omset-total-box" id="val-total">0</div>
    </div>

    <div class="bottom-section">
        <div class="footer-box"><label>CASH AWAL/AKHIR</label><input type="text" id="f_cash" oninput="hitung()"></div>
        <div class="footer-box"><label>NOTE / BERITA ACARA</label><input type="text" id="f_note" oninput="hitung()"></div>
    </div>
</div>

<div id="report-overlay">
    <div style="display:flex; gap:5px; margin-bottom:10px; width: 360px; margin: 0 auto;">
        <button onclick="tutupOverlay()" style="padding:10px; flex:1; background:#444; color:#fff; border:none;">KEMBALI</button>
        <button onclick="downloadPNG()" style="padding:10px; flex:2; background:#e74c3c; color:white; border:none; font-weight:bold;">DOWNLOAD PNG</button>
    </div>
    <div id="printable-area" style="width: 360px; margin: 0 auto; background:#fff; padding:15px; border:1px solid #ccc;">
        <div id="isi-laporan"></div>
    </div>
</div>

<div id="riwayat-modal">
    <div class="modal-inner">
        <h3 style="color:#d4af37; text-align:center;">RIWAYAT</h3>
        <input type="date" id="h_tgl" style="width:100%; padding:10px; margin-bottom:10px;">
        <button class="btn-main btn-menu" style="width:100%;" onclick="cariDataRiwayat()">TAMPILKAN</button>
        <button class="btn-main btn-reset" style="width:100%; margin-top:5px;" onclick="tutupRiwayat()">BATAL</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDZU6wFZPbBX0di2sAG7ve93ArFgdZ0trw",
        authDomain: "laporan-harian-f096f.firebaseapp.com",
        databaseURL: "https://laporan-harian-f096f-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "laporan-harian-f096f",
        storageBucket: "laporan-harian-f096f.firebasestorage.app",
        messagingSenderId: "1063740425135",
        appId: "1:1063740425135:web:2d7a4befce6521d72d255a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const barang_list = ["CUP KECIL", "CUP BESAR", "CUP HOT", "BOTOL 1 LITER", "BOTOL 500 ML", "GULA AREN", "GULA PUTIH", "KOPI", "SUSU UHT", "KRIMER", "SEA SALT", "FN", "SKM", "HERSHEY'S", "REMON", "SEDOTAN KEC", "SEDOTAN BSR", "PLASTIK ISI 2", "PLASTIK ISI 1", "PLASTIK BSR", "CUP SEALER", "BASE SUSU", "BASE KOPI", "ROTI"];
    const omset_list = ["CASH", "TRANSFER", "GRAB FOOD", "OVO", "SHOPEE FOOD", "SHOPEE PAY", "GOJEK", "GOPAY", "AIRASIA"];
    const list_kosongkan = ["CUP_KECIL", "CUP_BESAR", "SUSU_UHT", "KRIMER", "SKM", "BASE_SUSU", "BASE_KOPI", "ROTI"];

    function initApp() {
        const d = new Date();
        const tglStr = d.toISOString().split('T')[0];
        const hr = ["MINGGU", "SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU"];
        
        document.getElementById('label-tgl').innerText = tglStr;
        document.getElementById('label-hari').innerText = hr[d.getDay()];
        
        // Atur Cabang & Shift
        const c = localStorage.getItem('p_cab') || "Tandur";
        document.getElementById('main-cab').value = c;
        updateShiftDropdown(c);
        
        const s = localStorage.getItem('p_shf') || "SHIFT 1";
        document.getElementById('main-shf').value = s;

        // Render Table
        renderTables();

        // CEK DRAFT LOCAL DULU
        const local = localStorage.getItem(`draft_${c}_${s}`);
        if(local) {
            const data = JSON.parse(local);
            Object.keys(data).forEach(k => { if(document.getElementById(k)) document.getElementById(k).value = data[k]; });
            hitung();
        } else {
            // JIKA TIDAK ADA DRAFT, TARIK DARI CLOUD KEMARIN
            tarikDataKemarin(tglStr, c, s);
        }
    }

    function renderTables() {
        const bBody = document.getElementById('list-barang'); bBody.innerHTML = "";
        barang_list.forEach(item => {
            const id = item.replace(/[^A-Z0-9]/ig, "_");
            bBody.innerHTML += `<tr><td class="col-nama">${item}</td>
                <td><input type="text" id="stok_${id}" oninput="hitung()"></td>
                <td><input type="text" id="msk_${id}" oninput="hitung()"></td>
                <td><input type="text" id="rsk_${id}" oninput="hitung()"></td>
                <td><input type="text" id="trjl_${id}" oninput="hitung()"></td>
                <td><input type="text" id="sisa_${id}" oninput="hitung()"></td></tr>`;
        });
        const oBody = document.getElementById('list-omset'); oBody.innerHTML = "";
        omset_list.forEach(m => {
            oBody.innerHTML += `<div class="omset-row"><span>${m}</span><input type="text" class="inp-o" id="o_${m.replace(/[^A-Z0-9]/ig,'_')}" oninput="hitung()"></div>`;
        });
    }

    function updateShiftDropdown(cabang) {
        const shfSelect = document.getElementById('main-shf');
        const cab1Shift = ["Pondok Indah", "Cemput", "Menteng"];
        if(cab1Shift.includes(cabang)) {
            shfSelect.innerHTML = `<option value="SHIFT 1">SHIFT 1</option>`;
            localStorage.setItem('p_shf', "SHIFT 1");
        } else {
            shfSelect.innerHTML = `<option value="SHIFT 1">SHIFT 1</option><option value="SHIFT 2">SHIFT 2</option>`;
        }
    }

    function tarikDataKemarin(tglSekarang, cab, shf) {
        let kemaren = new Date(tglSekarang);
        kemaren.setDate(kemaren.getDate() - 1);
        const tglKemarinStr = kemaren.toISOString().split('T')[0];

        // Logika Tarik: Jika cabang punya 2 shift, ambil dari SHIFT 2 kemarin. Jika 1 shift, ambil dari SHIFT 1.
        const cab1Shift = ["Pondok Indah", "Cemput", "Menteng"];
        const shiftSumber = cab1Shift.includes(cab) ? "SHIFT 1" : "SHIFT 2";

        db.ref('Laporan/' + tglKemarinStr + '/' + cab + '/' + shiftSumber).once('value', snp => {
            if(snp.val()) {
                const dataKemarin = snp.val().barang;
                barang_list.forEach(item => {
                    const id = item.replace(/[^A-Z0-9]/ig, "_");
                    if(dataKemarin[id]) {
                        const sisaKemarin = dataKemarin[id].sisa || "0";
                        document.getElementById('stok_' + id).value = sisaKemarin;
                        // Isi Sisa sama dengan Stok, kecuali daftar pengecualian
                        if(!list_kosongkan.includes(id)) {
                            document.getElementById('sisa_' + id).value = sisaKemarin;
                        }
                    }
                });
                hitung();
            }
        });
    }

    function hitung() {
        let tot = 0;
        document.querySelectorAll('.inp-o').forEach(i => { tot += parseInt(i.value.replace(/[^0-9]/g,'')) || 0; });
        document.getElementById('val-total').innerText = tot.toLocaleString('id-ID');
        const data = {};
        document.querySelectorAll('input').forEach(i => { if(i.id) data[i.id] = i.value; });
        localStorage.setItem(`draft_${document.getElementById('main-cab').value}_${document.getElementById('main-shf').value}`, JSON.stringify(data));
    }

    function prosesSimpan() {
        const finalData = {
            hari: document.getElementById('label-hari').innerText,
            tgl: document.getElementById('label-tgl').innerText,
            cab: document.getElementById('main-cab').value,
            shf: document.getElementById('main-shf').value,
            total: document.getElementById('val-total').innerText,
            roti: { cok: document.getElementById('r_cok').value || 0, van: document.getElementById('r_van').value || 0, blu: document.getElementById('r_blu').value || 0 },
            omset: {}, barang: {},
            f_cash: document.getElementById('f_cash').value || "-", f_note: document.getElementById('f_note').value || "-"
        };
        barang_list.forEach(item => {
            const id = item.replace(/[^A-Z0-9]/ig, "_");
            finalData.barang[id] = { stok: document.getElementById('stok_'+id).value || 0, msk: document.getElementById('msk_'+id).value || 0, rsk: document.getElementById('rsk_'+id).value || 0, trjl: document.getElementById('trjl_'+id).value || 0, sisa: document.getElementById('sisa_'+id).value || 0 };
        });
        omset_list.forEach(m => { finalData.omset[m] = document.getElementById("o_" + m.replace(/[^A-Z0-9]/ig,'_')).value || 0; });

        db.ref('Laporan/' + finalData.tgl + '/' + finalData.cab + '/' + finalData.shf).set(finalData).then(() => {
            alert("Berhasil Simpan!");
            tampilkanLaporanFinal(finalData);
        });
    }

    function gantiLokasi() {
        const c = document.getElementById('main-cab').value;
        localStorage.setItem('p_cab', c);
        updateShiftDropdown(c);
        location.reload();
    }
    function gantiShift() {
        localStorage.setItem('p_shf', document.getElementById('main-shf').value);
        location.reload();
    }
    function resetApp() { if(confirm("Hapus draft hari ini?")) { localStorage.removeItem(`draft_${document.getElementById('main-cab').value}_${document.getElementById('main-shf').value}`); location.reload(); } }
    function bukaRiwayat() { document.getElementById('riwayat-modal').style.display='block'; }
    function tutupRiwayat() { document.getElementById('riwayat-modal').style.display='none'; }
    function tutupOverlay() { document.getElementById('report-overlay').style.display='none'; }
    
    function cariDataRiwayat() {
        const t = document.getElementById('h_tgl').value;
        const c = document.getElementById('main-cab').value;
        const s = document.getElementById('main-shf').value;
        db.ref('Laporan/'+t+'/'+c+'/'+s).once('value', snp => {
            if(snp.val()) { tampilkanLaporanFinal(snp.val()); tutupRiwayat(); } else { alert("Data tidak ada!"); }
        });
    }

    function tampilkanLaporanFinal(d) {
        let h = `<div style="color:#000; font-family:sans-serif; padding:10px; background:#fff;">
            <h2 style="text-align:center; margin:0;">KOPI SETENGAH-4</h2>
            <p style="text-align:center; font-size:10px; margin-bottom:10px;">${d.cab} - ${d.shf} (${d.tgl})</p>
            <table style="width:100%; border-collapse:collapse; font-size:10px; border:1px solid #000;">
                <tr style="background:#ddd;"><th style="border:1px solid #000; padding:3px;">BARANG</th><th style="border:1px solid #000;">STOK</th><th style="border:1px solid #000;">TRJL</th><th style="border:1px solid #000;">SISA</th></tr>`;
        barang_list.forEach(item => {
            const id = item.replace(/[^A-Z0-9]/ig, "_");
            const b = d.barang[id] || {stok:0, trjl:0, sisa:0};
            h += `<tr><td style="border:1px solid #000; padding:2px;">${item}</td><td style="border:1px solid #000; text-align:center;">${b.stok}</td><td style="border:1px solid #000; text-align:center;">${b.trjl}</td><td style="border:1px solid #000; text-align:center; font-weight:bold;">${b.sisa}</td></tr>`;
        });
        h += `</table><div style="margin-top:10px; font-weight:bold;">TOTAL OMSET: Rp ${d.total}</div></div>`;
        document.getElementById('isi-laporan').innerHTML = h;
        document.getElementById('report-overlay').style.display = 'block';
    }

    function downloadPNG() {
        html2canvas(document.getElementById('printable-area')).then(canv => {
            const link = document.createElement('a');
            link.download = `LAPORAN_${document.getElementById('main-cab').value}_${document.getElementById('label-tgl').innerText}.png`;
            link.href = canv.toDataURL(); link.click();
        });
    }
</script>
</body>
</html>
