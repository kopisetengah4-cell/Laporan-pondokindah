<script>
    // ... (Bagian FirebaseConfig dan inisialisasi di atas tetap sama) ...

    function simpanDanTampilkanLaporan() {
        const tgl = document.getElementById('label-tgl').innerText;
        const cab = document.getElementById('main-cabang').value;
        const shf = document.getElementById('main-shift').value;
        const total = document.getElementById('display-total').innerText;
        
        // Kumpulkan semua data input
        const data = { total: total, tanggal: tgl, cabang: cab, shift: shf };
        document.querySelectorAll('input').forEach(el => { 
            if(el.id) data[el.id] = el.value; 
        });

        // Simpan ke Firebase Laporan Utama
        db.ref('Laporan/' + tgl + '/' + cab + '/' + shf).set(data)
            .then(() => {
                alert("Data Berhasil Disimpan!");
                renderLaporanPutih(data, tgl, cab, shf);
                document.getElementById('report-overlay').style.display = 'block';
            })
            .catch(err => alert("Gagal Simpan: " + err));
    }

    // FUNGSI RIWAYAT YANG SERING TERPUTUS
    function bukaRiwayat() { 
        updateShiftOptionsHistory(); 
        document.getElementById('riwayat-modal').style.display = 'block'; 
    }

    function tutupRiwayat() { 
        document.getElementById('riwayat-modal').style.display = 'none'; 
    }

    function updateShiftOptionsHistory() {
        const cab = document.getElementById('hist-cabang').value;
        const shiftSelect = document.getElementById('hist-shift');
        let options = '<option value="SHIFT 1">SHIFT 1</option>';
        if (!cabangSatuShift.includes(cab)) options += '<option value="SHIFT 2">SHIFT 2</option>';
        shiftSelect.innerHTML = options;
    }

    function ambilDataRiwayat() {
        const tgl = document.getElementById('hist-date').value;
        const cab = document.getElementById('hist-cabang').value;
        const shf = document.getElementById('hist-shift').value;
        if(!tgl) return alert("Pilih tanggal terlebih dahulu!");

        db.ref('Laporan/' + tgl + '/' + cab + '/' + shf).once('value', s => {
            const res = s.val();
            if(res) { 
                renderLaporanPutih(res, tgl, cab, shf); 
                tutupRiwayat(); 
                document.getElementById('report-overlay').style.display = 'block'; 
            } else {
                alert("Data tidak ditemukan untuk tanggal & cabang ini.");
            }
        });
    }

    function renderLaporanPutih(d, tgl, cab, shf) {
        const dateObj = new Date(tgl);
        const opsiHari = ["MINGGU", "SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU"];
        const hari = opsiHari[dateObj.getDay()];
        
        let html = `
            <div style="text-align:center; font-weight:bold; margin-bottom:10px; border-bottom:2px solid #000; padding-bottom:5px;">
                KOPI SETENGAH-4 - LAPORAN HARIAN
            </div>
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:10px;">
                <div><b>${hari}</b><br>TGL: ${tgl}<br>CABANG: ${cab.toUpperCase()}<br>SHIFT: ${shf}</div>
                <div style="width:35%;">
                    <table style="width:100%; border-collapse:collapse; font-size:9px; border:1px solid #000;">
                        <tr style="background:#eee;"><th colspan="2">SISA ROTI</th></tr>
                        <tr><td>COKLAT</td><td style="text-align:center;">${d['roti-coklat']||'0'}</td></tr>
                        <tr><td>VANILLA</td><td style="text-align:center;">${d['roti-vanilla']||'0'}</td></tr>
                        <tr><td>BLUEBERRY</td><td style="text-align:center;">${d['roti-blueberry']||'0'}</td></tr>
                    </table>
                </div>
            </div>
            <table style="width:100%; border-collapse:collapse; font-size:9px;">
                <thead>
                    <tr style="background:#eee;">
                        <th style="border:1px solid #000; text-align:left;">BARANG</th>
                        <th style="border:1px solid #000;">STOK</th>
                        <th style="border:1px solid #000;">MSK</th>
                        <th style="border:1px solid #000;">TRJL</th>
                        <th style="border:1px solid #000;">SISA</th>
                    </tr>
                </thead>
                <tbody>`;
        
        daftarBarang.forEach(item => {
            const id = item.replace(/[^A-Z0-9]/ig, "_");
            html += `<tr>
                <td style="border:1px solid #000; font-weight:bold;">${item}</td>
                <td style="border:1px solid #000; text-align:center;">${d['stok_'+id]||''}</td>
                <td style="border:1px solid #000; text-align:center;">${d['msk_'+id]||''}</td>
                <td style="border:1px solid #000; text-align:center;">${d['trjl_'+id]||''}</td>
                <td style="border:1px solid #000; text-align:center; font-weight:bold;">${d['sisa_'+id]||''}</td>
            </tr>`;
        });

        html += `</tbody></table>
            <div style="display:flex; border:2px solid #000; margin-top:10px; background:#f9f9f9;">
                <div style="flex:1; padding:5px; font-size:10px; border-right:1px solid #000;">
                    <b>TOTAL OMSET:</b><br><span style="font-size:18px;">Rp ${d.total || '0'}</span>
                </div>
                <div style="flex:1; padding:5px; font-size:9px;">
                    <b>NOTE:</b><br>${d.note || '-'}
                </div>
            </div>`;
            
        document.getElementById('render-content').innerHTML = html;
    }

    function downloadLaporanGambar() {
        const area = document.getElementById('printable-area');
        html2canvas(area, { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Report_${document.getElementById('label-tgl').innerText}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }

    function resetDraftHalaman() {
        if(confirm("Hapus semua ketikan di halaman ini?")) {
            const cab = document.getElementById('main-cabang').value;
            const shf = document.getElementById('main-shift').value;
            localStorage.removeItem(`draft_${cab}_${shf}`);
            localStorage.removeItem(`manual_${cab}_${shf}`);
            location.reload();
        }
    }
</script>
